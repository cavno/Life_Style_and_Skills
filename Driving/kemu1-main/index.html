<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>科目一核心知识点速查 · 肖肖3小时精华课整理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#F3EAD3; --parch2:#ECE1C6; --card:#FBF7EC; --card2:#F6EEDC;
  --teal:#3F7E6B; --teal-dk:#2E5E50; --teal-soft:#DCE7E2;
  --terra:#BC4B33; --terra-soft:#F6DFD7; --amber:#E29A48;
  --ink:#2B2820; --muted:#6E664F; --line:#D8CDAF; --line2:#E4DAC0;
  --serif:'Noto Serif SC',Georgia,'Songti SC',serif;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--parch); color:var(--ink); font-family:var(--sans);
  font-size:15px; line-height:1.65; -webkit-font-smoothing:antialiased; padding-bottom:48px}
.wrap{max-width:760px; margin:0 auto; padding:0 14px}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--teal); outline-offset:2px}

.hero{padding:22px 0 14px}
.hero .kicker{font-size:12px; letter-spacing:.22em; color:var(--teal); font-weight:600; text-transform:uppercase}
.hero h1{font-family:var(--serif); font-weight:700; font-size:26px; line-height:1.25; margin:6px 0 4px; color:var(--teal-dk)}
.hero .sub{color:var(--muted); font-size:13.5px}
.hero .sub b{color:var(--terra)}

.sticky{position:sticky; top:0; z-index:20; background:linear-gradient(var(--parch) 78%,rgba(243,234,211,0)); padding-top:8px}
.tabs{display:flex; gap:6px; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:5px}
.tab{flex:1; text-align:center; font-family:var(--serif); font-weight:600; font-size:14px; padding:9px 4px; border-radius:8px;
  color:var(--muted); cursor:pointer; user-select:none; border:none; background:transparent; transition:.15s}
.tab .n{display:block; font-family:var(--sans); font-size:10.5px; font-weight:500; opacity:.75; margin-top:1px}
.tab.active{background:var(--teal); color:#fff; box-shadow:0 2px 6px rgba(46,94,80,.25)}
.tab.active .n{opacity:.85}

.searchrow{display:flex; gap:8px; padding:11px 2px 4px}
.search{flex:1; border:1px solid var(--line); background:var(--card); border-radius:20px; padding:8px 14px;
  font-size:13.5px; color:var(--ink); font-family:var(--sans)}
.search::placeholder{color:#A79D82}
.rtoggle{flex:none; display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--teal-dk);
  cursor:pointer; user-select:none; background:var(--card); border:1px solid var(--line); border-radius:20px; padding:5px 13px}
.rtoggle.on{background:var(--terra); color:#fff; border-color:var(--terra)}
.rtoggle .sw{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.55}
.rtoggle.on .sw{opacity:1}
.chips{display:flex; gap:7px; overflow-x:auto; padding:8px 2px 6px; -ms-overflow-style:none; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none; border:1px solid var(--line); background:var(--card); border-radius:18px; padding:5px 13px;
  font-size:12.5px; color:var(--teal-dk); font-weight:600; cursor:pointer}
.progress{padding:4px 2px 10px}
.pbar{height:7px; background:var(--parch2); border-radius:6px; overflow:hidden; border:1px solid var(--line2)}
.pfill{height:100%; background:var(--teal); width:0; transition:width .25s}
.ptext{font-size:11.5px; color:var(--muted); margin-top:5px}
.ptext b{color:var(--teal-dk)}
.hint{font-size:11.5px; color:var(--muted); padding:0 2px 8px; display:none}
.recite-on .hint{display:block}

.msec{scroll-margin-top:70px}
.mbanner{display:flex; align-items:baseline; gap:10px; margin:20px 0 10px; padding-bottom:7px; border-bottom:2px solid var(--teal-soft)}
.mnum{font-family:var(--serif); font-weight:700; font-size:13px; color:#fff; background:var(--teal);
  width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; align-self:center}
.mname{font-family:var(--serif); font-weight:700; font-size:19px; color:var(--teal-dk)}
.mdesc{font-size:12px; color:var(--muted)}
.kcard{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px 15px 14px; margin-bottom:10px; box-shadow:0 1px 0 rgba(0,0,0,.03)}
.kcard.mastered{opacity:.62}
.khead{display:flex; align-items:flex-start; gap:10px}
.kname{font-family:var(--serif); font-weight:700; font-size:16.5px; color:var(--teal-dk); line-height:1.35; flex:1}
.mark{flex:none; width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line); background:var(--card2);
  cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; margin-top:1px; padding:0}
.kcard.mastered .mark{background:var(--teal); border-color:var(--teal); color:#fff}
.kou{margin:8px 0 0; font-family:var(--serif); font-weight:600; font-size:16.5px; color:var(--terra); line-height:1.55}
.kou::before{content:'「'; color:rgba(188,75,51,.5); margin-right:1px}
.kou::after{content:'」'; color:rgba(188,75,51,.5); margin-left:1px}
.knote{margin-top:7px; font-size:13px; color:#4A4636}
.veil{display:none; margin-top:9px; border:1.5px dashed var(--line); border-radius:9px; padding:11px;
  text-align:center; color:var(--muted); font-size:12.5px; background:var(--card2)}
.recite-on .kcard:not(.revealed) .kbody{display:none}
.recite-on .kcard:not(.revealed) .veil{display:block}
.recite-on .kcard{cursor:pointer}
.empty{display:none; text-align:center; color:var(--muted); font-size:13px; padding:26px 0}

.gsec{margin:18px 0}
.gsec .gh{font-family:var(--serif); font-weight:700; font-size:17px; color:var(--teal-dk); margin:0 0 4px}
.gsec .gd{font-size:12.5px; color:var(--muted); margin:0 0 11px}
.plain{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:13.5px}
.chipset{display:flex; flex-wrap:wrap; gap:7px; margin:6px 0 2px}
.c2{border-radius:16px; padding:4px 12px; font-size:13px; font-weight:600}
.c2.yes{background:#E3EEE9; border:1px solid #BFD6CC; color:var(--teal-dk)}
.c2.no{background:var(--terra-soft); border:1px solid #E4BCAE; color:#8A3B1E}
.setlab{font-size:12.5px; font-weight:700; margin:10px 0 2px}
.setlab.yes{color:var(--teal-dk)} .setlab.no{color:#8A3B1E}
.jlist{list-style:none; margin:6px 0 0; padding:0; display:flex; flex-direction:column; gap:6px}
.jlist li{background:var(--card); border:1px solid var(--line); border-radius:9px; padding:8px 12px 8px 34px; position:relative; font-size:13px}
.jlist li::before{position:absolute; left:11px; top:8px; font-weight:700}
.jlist.yes li::before{content:'✓'; color:var(--teal)}
.jlist.no li::before{content:'✕'; color:var(--terra)}
.find{list-style:none; margin:0; padding:0; counter-reset:f; display:flex; flex-direction:column; gap:7px}
.find li{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 12px 9px 42px; position:relative; font-size:13.5px; line-height:1.5}
.find li::before{counter-increment:f; content:counter(f); position:absolute; left:11px; top:9px; width:22px; height:22px; border-radius:50%;
  background:var(--terra); color:#fff; font-family:var(--serif); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center}
.find b{color:var(--teal-dk)}
.find .arr{color:var(--terra); font-weight:700; margin:0 4px}
.find.teal li::before{background:var(--teal)}
.warn{background:#FBF1E2; border:1px solid #E8CFA4; border-left:4px solid var(--amber); border-radius:10px; padding:11px 14px; font-size:13px}
.warn b{color:#8A5A12}

.foot{margin:26px 0 8px; font-size:11.5px; color:var(--muted); text-align:center; line-height:1.7}
.foot b{color:var(--teal-dk)}
@media (max-width:420px){ .hero h1{font-size:23px} .kname{font-size:16px} }
@media (prefers-reduced-motion:reduce){*{transition:none!important; scroll-behavior:auto!important}}
</style>
</head>

var store={_m:{},
  get:function(k){try{return localStorage.getItem(k)}catch(e){return this._m[k]||null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){this._m[k]=v}}};
var TABS=['核心知识点','关键词答题法·临考'];
var current='核心知识点';
var recite=false;
var FLAT=[];
MODULES.forEach(function(m){ m.items.forEach(function(it,i){ FLAT.push({key:m.id+'_'+i, m:m, it:it}); }); });
var TOTAL=FLAT.length;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderTabs(){
  var el=document.getElementById('tabs'); el.innerHTML='';
  TABS.forEach(function(t){
    var b=document.createElement('button');
    b.className='tab'+(t===current?' active':'');
    var sub=(t==='核心知识点')?('18 类 '+TOTAL+' 条'):'好感词 · 口诀 · 考场技巧';
    b.innerHTML=esc(t)+'<span class="n">'+sub+'</span>';
    b.onclick=function(){current=t; render();};
    el.appendChild(b);
  });
}
function doneCount(){
  var n=0; FLAT.forEach(function(f){ if(store.get('sk1_'+f.key)==='1') n++; });
  return n;
}
function updateProgress(){
  var d=doneCount(), pct=Math.round(d/TOTAL*100);
  var pf=document.getElementById('pfill'), pt=document.getElementById('ptext');
  if(pf){pf.style.width=pct+'%'}
  if(pt){pt.innerHTML='已掌握 <b>'+d+'</b> / '+TOTAL+' 条 · 点卡片右上圆圈标记'}
}
function renderControls(){
  var el=document.getElementById('controls');
  if(current!=='核心知识点'){ el.innerHTML=''; return; }
  var chips=MODULES.map(function(m){
    return '<button class="chip" data-t="'+m.id+'">'+esc(m.chip)+'</button>';
  }).join('');
  el.innerHTML=
    '<div class="searchrow">'+
      '<input class="search" id="q" type="search" placeholder="搜索知识点 / 口诀，如：超速、审验、雾灯、ABS…">'+
      '<button class="rtoggle'+(recite?' on':'')+'" id="rt"><i class="sw"></i>背诵模式</button>'+
    '</div>'+
    '<div class="hint">背诵模式已开：只显示知识点名称，点卡片显示口诀与要点。</div>'+
    '<div class="chips">'+chips+'</div>'+
    '<div class="progress"><div class="pbar"><div class="pfill" id="pfill"></div></div><div class="ptext" id="ptext"></div></div>';
  document.getElementById('rt').onclick=function(){
    recite=!recite;
    this.classList.toggle('on',recite);
    document.getElementById('view').classList.toggle('recite-on',recite);
    document.body.classList.toggle('recite-on',recite);
    if(!recite){ document.querySelectorAll('.kcard.revealed').forEach(function(c){c.classList.remove('revealed')}); }
  };
  document.getElementById('q').addEventListener('input',function(){ applySearch(this.value); });
  el.querySelectorAll('.chip').forEach(function(c){
    c.onclick=function(){
      var t=document.getElementById(this.getAttribute('data-t'));
      if(t){ t.scrollIntoView({behavior: matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth'}); }
    };
  });
  updateProgress();
}
function cardHTML(f){
  var it=f.it, mastered=store.get('sk1_'+f.key)==='1';
  var body='';
  if(it.kou) body+='<div class="kou">'+esc(it.kou)+'</div>';
  body+='<div class="knote">'+esc(it.note)+'</div>';
  return '<article class="kcard'+(mastered?' mastered':'')+'" data-key="'+f.key+'">'+
    '<div class="khead"><h3 class="kname">'+esc(it.k)+'</h3>'+
    '<button class="mark" data-key="'+f.key+'" title="标记已掌握" aria-label="标记已掌握">'+(mastered?'✓':'')+'</button></div>'+
    '<div class="kbody">'+body+'</div>'+
    '<div class="veil">点击显示口诀与要点</div>'+
  '</article>';
}
function renderKnowledge(){
  var html='';
  MODULES.forEach(function(m){
    html+='<section class="msec" id="'+m.id+'">'+
      '<div class="mbanner"><span class="mnum">'+esc(m.num)+'</span>'+
      '<span class="mname">'+esc(m.name)+'</span><span class="mdesc">'+esc(m.desc)+'</span></div>';
    m.items.forEach(function(it,i){ html+=cardHTML({key:m.id+'_'+i,it:it}); });
    html+='</section>';
  });
  html+='<div class="empty" id="empty">没有匹配的知识点，换个关键词试试。</div>';
  var view=document.getElementById('view');
  view.className = recite?'recite-on':'';
  document.body.classList.toggle('recite-on',recite);
  view.innerHTML=html;
  view.querySelectorAll('.mark').forEach(function(b){
    b.onclick=function(e){
      e.stopPropagation();
      var k='sk1_'+this.getAttribute('data-key');
      var now=store.get(k)==='1'?'0':'1'; store.set(k,now);
      var card=this.closest('.kcard');
      card.classList.toggle('mastered',now==='1');
      this.textContent = now==='1'?'✓':'';
      updateProgress();
    };
  });
  view.addEventListener('click',function(e){
    if(!recite) return;
    var card=e.target.closest('.kcard'); if(!card) return;
    if(e.target.closest('.mark')) return;
    card.classList.toggle('revealed');
  });
  var q=document.getElementById('q'); if(q&&q.value) applySearch(q.value);
}
function applySearch(q){
  q=(q||'').trim().toLowerCase();
  var any=false;
  MODULES.forEach(function(m){
    var sec=document.getElementById(m.id); if(!sec) return;
    var hit=false;
    var cards=sec.querySelectorAll('.kcard');
    m.items.forEach(function(it,i){
      var text=(it.k+it.kou+it.note).toLowerCase();
      var show=!q||text.indexOf(q)>=0;
      cards[i].style.display=show?'':'none';
      if(show) hit=true;
    });
    sec.style.display=hit?'':'none';
    if(hit) any=true;
  });
  var em=document.getElementById('empty'); if(em) em.style.display=any?'none':'block';
}
function renderTech(){
  document.getElementById('view').className='';
  document.body.classList.remove('recite-on');
  var yes=SAFE_YES.map(function(w){return '<span class="c2 yes">'+esc(w)+'</span>'}).join('');
  var no=SAFE_NO.map(function(w){return '<span class="c2 no">'+esc(w)+'</span>'}).join('');
  var f1=FIND.map(function(t){
    var i=t.indexOf('→');
    if(i<0) return '<li>'+esc(t)+'</li>';
    var head=esc(t.slice(0,i).trim()), rest=esc(t.slice(i+1).trim());
    return '<li><b>'+head+'</b><span class="arr">→</span>'+rest+'</li>';
  }).join('');
  var f2=NUMS.map(function(t){
    var i=t.indexOf('：');
    if(i<0) return '<li>'+esc(t)+'</li>';
    return '<li><b>'+esc(t.slice(0,i))+'</b>：'+esc(t.slice(i+1))+'</li>';
  }).join('');
  var tips=EXAM_TIPS.map(function(t){return '<li>'+esc(t)+'</li>'}).join('');
  document.getElementById('view').innerHTML=
    '<section class="gsec"><h2 class="gh">一、答题总原则</h2>'+
      '<div class="plain">'+esc(STUDY)+'</div></section>'+
    '<section class="gsec"><h2 class="gh">二、好感词 vs 警示词</h2>'+
      '<p class="gd">关键词答题法可答对约 80% 的常识题。</p>'+
      '<div class="setlab yes">✓ 看到大概率就是对（好感词）</div><div class="chipset">'+yes+'</div>'+
      '<div class="setlab no">✕ 看到大概率就是错（警示词）</div><div class="chipset">'+no+'</div>'+
      '<div class="plain" style="margin-top:10px">'+esc(SAFE_NOTE)+'</div></section>'+
    '<section class="gsec"><h2 class="gh">三、看见什么找什么</h2>'+
      '<p class="gd">考场秒答清单，进考场前最后过一遍。</p>'+
      '<ol class="find">'+f1+'</ol></section>'+
    '<section class="gsec"><h2 class="gh">四、数字口诀速查</h2>'+
      '<p class="gd">全部数字类考点浓缩在这一页。</p>'+
      '<ol class="find teal">'+f2+'</ol></section>'+
    '<section class="gsec"><h2 class="gh">五、考场操作提示</h2>'+
      '<ul class="jlist yes">'+tips+'</ul></section>'+
    '<section class="gsec"><h2 class="gh">六、易错提醒</h2>'+
      '<div class="warn"><b>注意：</b>凡"审验机动车""扣行驶证""扣身份证""追尾标志""高速有 3 分超速""记 2 分"——见到直接判错；判刑题先找"拘役"和"逃"字。</div></section>';
}
function render(){
  renderTabs();
  renderControls();
  if(current==='核心知识点') renderKnowledge(); else renderTech();
  window.scrollTo({top:0});
}
render();
</script>
</body>
</html>
