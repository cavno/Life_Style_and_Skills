<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>水头考场科目三速查 · GA 1026 主干（自动挡）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#F3EAD3; --parch2:#ECE1C6; --card:#FBF7EC; --card2:#F6EEDC;
  --teal:#3F7E6B; --teal-dk:#2E5E50; --teal-soft:#DCE7E2;
  --terra:#BC4B33; --amber:#D98E32; --yellow:#EBD08A; --slate:#5B7DA0; --grey:#9A937E;
  --ink:#2B2820; --muted:#6E664F; --line:#D8CDAF; --line2:#E4DAC0; --sand:#EFE7D4;
  --serif:'Noto Serif SC',Georgia,'Songti SC',serif;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
*{box-sizing:border-box} html,body{margin:0}
body{background:var(--parch); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.62;
  -webkit-font-smoothing:antialiased; padding-bottom:48px}
.wrap{max-width:780px; margin:0 auto; padding:0 14px}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--teal); outline-offset:2px}
.hero{padding:20px 0 12px}
.hero .kicker{font-size:12px; letter-spacing:.2em; color:var(--teal); font-weight:600; text-transform:uppercase}
.hero h1{font-family:var(--serif); font-weight:700; font-size:25px; line-height:1.25; margin:6px 0 4px; color:var(--teal-dk)}
.hero .sub{color:var(--muted); font-size:13px}
.hero .sub b{color:var(--terra)}
.sticky{position:sticky; top:0; z-index:20; background:linear-gradient(var(--parch) 80%,rgba(243,234,211,0)); padding-top:8px}
.tabs{display:flex; gap:5px; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:5px}
.tab{flex:1; text-align:center; font-family:var(--serif); font-weight:600; font-size:13px; padding:8px 2px; border-radius:8px;
  color:var(--muted); cursor:pointer; user-select:none; border:none; background:transparent; transition:.15s; white-space:nowrap}
.tab .n{display:block; font-family:var(--sans); font-size:9.5px; font-weight:500; opacity:.7; margin-top:1px}
.tab.active{background:var(--teal); color:#fff; box-shadow:0 2px 6px rgba(46,94,80,.25)}
.tab.active .n{opacity:.85}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:11px 2px 6px}
.legend{display:flex; gap:9px; align-items:center; font-size:11px; color:var(--muted); flex-wrap:wrap}
.legend span{display:inline-flex; align-items:center; gap:4px}
.dot{width:10px; height:10px; border-radius:3px; display:inline-block}
.dot.fail{background:var(--terra)} .dot.d10{background:var(--amber)} .dot.d5{background:var(--yellow)}
.dot.gb{background:var(--teal)} .dot.cc{background:var(--slate)} .dot.zl{background:var(--grey)}
.filter{margin-left:auto; display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--teal-dk); cursor:pointer;
  user-select:none; background:var(--card); border:1px solid var(--line); border-radius:20px; padding:5px 11px}
.filter.on{background:var(--terra); color:#fff; border-color:var(--terra)}
.filter .sw{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.5}
.filter.on .sw{opacity:1}
.progress{padding:2px 2px 10px}
.pbar{height:7px; background:var(--parch2); border-radius:6px; overflow:hidden; border:1px solid var(--line2)}
.pfill{height:100%; background:var(--teal); width:0; transition:width .25s}
.ptext{font-size:11px; color:var(--muted); margin-top:5px}
.ptext b{color:var(--teal-dk)}
.note-src{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:2px 14px; margin:4px 0 12px}
.note-src summary{font-family:var(--serif); font-weight:600; font-size:13.5px; color:var(--teal-dk); cursor:pointer; padding:10px 0; list-style:none}
.note-src summary::-webkit-details-marker{display:none}
.note-src summary::before{content:'▸ '; color:var(--teal)}
.note-src[open] summary::before{content:'▾ '}
.note-src .body{font-size:12.5px; color:#4A4636; padding:0 0 12px; line-height:1.7}
.note-src .body b{color:var(--teal-dk)}
.note-src .body .em{color:var(--terra); font-weight:600}
.srcbadge{display:inline-block; font-size:10.5px; font-weight:700; color:#fff; border-radius:5px; padding:1px 6px; margin:0 2px; vertical-align:1px}
.srcbadge.gb{background:var(--teal)} .srcbadge.cc{background:var(--slate)} .srcbadge.zl{background:var(--grey)}
.comp{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px}
.comp li{background:var(--card); border:1px solid var(--line); border-left:4px solid var(--terra); border-radius:10px; padding:10px 13px}
.comp li.star{background:#FBF1EC}
.comp .top{display:flex; align-items:flex-start; gap:8px}
.comp .ct{font-size:14px; font-weight:600; flex:1}
.comp .cn{font-size:12px; color:var(--muted); margin-top:3px}
.msec{scroll-margin-top:64px; margin-bottom:6px}
.mbanner{display:flex; align-items:baseline; gap:9px; margin:18px 0 9px; padding-bottom:6px; border-bottom:2px solid var(--teal-soft)}
.mname{font-family:var(--serif); font-weight:700; font-size:17px; color:var(--teal-dk)}
.pens2{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px}
.pen2{display:flex; gap:8px; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:8px 11px; font-size:13.5px; line-height:1.45}
.pen2.star{background:#FBF1EC}
.pill{flex:none; min-width:24px; height:20px; padding:0 6px; border-radius:6px; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; margin-top:1px}
.pill.fail{background:var(--terra); color:#fff} .pill.d10{background:var(--amber); color:#3a2a10} .pill.d5{background:var(--yellow); color:#4a3a12}
.pen2 .txt{flex:1}
.pen2 .star-tag{display:inline-block; font-size:10px; font-weight:700; color:var(--terra); background:#F6D9CF; border-radius:5px; padding:0 5px; margin-left:5px; vertical-align:1px}
.pnote{font-size:12px; color:var(--muted); background:var(--sand); border:1px solid var(--line2); border-radius:9px; padding:8px 12px; margin:8px 0 2px; line-height:1.6}
.pnote b{color:var(--teal-dk)}
.route{position:relative; padding:4px 0 8px}
.route::before{content:''; position:absolute; left:20px; top:26px; bottom:26px; width:2px; background:var(--line); z-index:0}
.step{display:grid; grid-template-columns:42px 1fr; gap:13px; margin-bottom:14px; position:relative}
.node{position:relative; z-index:1; width:38px; height:38px; margin:0 auto; border-radius:50%; background:var(--teal); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:16px;
  box-shadow:0 2px 5px rgba(46,94,80,.28); border:3px solid var(--parch)}
.step.done .node{background:var(--teal-dk)}
.step.done .node::after{content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--teal-dk); border-radius:50%; font-size:18px}
.card{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px 15px 14px; box-shadow:0 1px 0 rgba(0,0,0,.03)}
.step.done .card{opacity:.62}
.chead{display:flex; align-items:flex-start; gap:10px}
.cname{font-family:var(--serif); font-weight:700; font-size:18px; color:var(--teal-dk); line-height:1.3; flex:1}
.mark{flex:none; width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line); background:var(--card2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; margin-top:1px; padding:0}
.step.done .mark{background:var(--teal); border-color:var(--teal); color:#fff}
.voice{margin:8px 0 2px; font-size:12.5px; color:var(--muted); display:flex; gap:7px; align-items:flex-start}
.vtag{flex:none; font-size:10.5px; font-weight:600; color:#fff; background:var(--teal); border-radius:5px; padding:2px 7px; margin-top:1px}
.vtag.silent{background:var(--muted)}
.act{margin-top:9px; font-size:13.5px; background:var(--card2); border-radius:9px; padding:9px 11px; border:1px solid var(--line2)}
.act .lab{font-family:var(--serif); font-weight:600; font-size:12px; color:var(--teal); display:block; margin-bottom:2px}
.pens{list-style:none; margin:11px 0 0; padding:0; display:flex; flex-direction:column; gap:7px}
.pens .plab{font-family:var(--serif); font-weight:600; font-size:12px; color:var(--terra)}
.pen{display:flex; gap:8px; align-items:flex-start; font-size:13.5px; line-height:1.45}
.pen.star .ptxt{font-weight:600}
.star-tag{display:inline-block; font-size:10.5px; font-weight:700; color:var(--terra); background:#F6D9CF; border-radius:5px; padding:0 5px; margin-left:5px; vertical-align:1px}
.rnote{margin-top:10px; font-size:12.5px; color:var(--muted); border-top:1px dashed var(--line); padding-top:8px}
.rnote b{color:var(--terra)}
.route.only-fail .pen:not(.tier-fail){display:none}
.proj.only-fail .pen2:not(.tier-fail){display:none}
.foot{margin:24px 0 8px; font-size:11px; color:var(--muted); text-align:center; line-height:1.7}
.foot b{color:var(--teal-dk)}
@media (max-width:430px){ .hero h1{font-size:22px} .cname{font-size:16px} .tab{font-size:12px} }
@media (prefers-reduced-motion:reduce){*{transition:none!important; scroll-behavior:auto!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="kicker">深圳 · 水头考场 · 自动挡 C2 · GA 1026 主干</div>
    <h1>科目三评判标准速查</h1>
    <div class="sub">综合评判＋16 项专项＋三条路线（每步独立定义）· 每条标注<b>来源层级</b> · 红＝不合格、橙＝扣10、黄＝扣5</div>
  </header>
  <div class="sticky"><nav class="tabs" id="tabs"></nav></div>
  <div id="controls"></div>
  <main id="view"></main>
  <footer class="foot">
    评判条款以国标 GA 1026 + 公安部令 162 号整理；路线、语音、限速来自车学宝考场教材与本人实操调整。<br>
    <b>非原文逐字誊抄，个别分值/表述以标准原文为准。</b>
  </footer>
</div>

var store={_m:{},get:function(k){try{return localStorage.getItem(k)}catch(e){return this._m[k]||null}},set:function(k,v){try{localStorage.setItem(k,v)}catch(e){this._m[k]=v}}};
var ROUTE_NAMES=Object.keys(DATA.routes);
var TABS=['综合评判','16项专项'].concat(ROUTE_NAMES);
var current='综合评判'; var onlyFail=false;
var TL={fail:'挂',d10:'扣10',d5:'扣5'};
var PROJ_TOTAL=DATA.proj.reduce(function(a,p){return a+p.items.length},0);
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function dk(r,i){return 'ga_'+r+'_'+i}

function renderTabs(){
  var el=document.getElementById('tabs'); el.innerHTML='';
  TABS.forEach(function(t){
    var b=document.createElement('button'); b.className='tab'+(t===current?' active':'');
    var sub = t==='综合评判'?(DATA.comp.length+' 条'): t==='16项专项'?(PROJ_TOTAL+' 条'):(DATA.routes[t].length+' 步');
    b.innerHTML=esc(t)+'<span class="n">'+sub+'</span>';
    b.onclick=function(){current=t; onlyFail=false; render();};
    el.appendChild(b);
  });
}
function srcNote(){
  return '<details class="note-src"><summary>来源分级说明（点开）</summary><div class="body">'+
    '评判条款以国标 <b>GA 1026</b>《机动车驾驶人考试内容和方法》（现行 2022 版）第 6 章 + <b>公安部令 162 号</b> 第 38 条整理，全国统一、深圳同此。'+
    '每条右侧标注来源：<span class="srcbadge gb">国标</span>权威条款；<span class="srcbadge cc">考场</span>车学宝路线图/考场惯例（语音、限速、路线、刷里程、停车点刹）；<span class="srcbadge zl">整理</span>本人对 C2 的适配判断。'+
    '<span class="em">诚实声明：</span>国标条目多方比对整理、力求完整准确，但非原文逐字誊抄，个别分值/表述以标准原文为准。已按 GA 1026 补齐此前遗漏项（如 10 秒未起步＝不合格、靠边>50cm 改判不合格、变道/超车增回头观察、掉头改为未开左转向灯即不合格）。'+
    '</div></details>';
}
function legendHTML(withSrc){
  var s='<div class="legend"><span><i class="dot fail"></i>不合格</span><span><i class="dot d10"></i>扣10</span><span><i class="dot d5"></i>扣5</span>';
  if(withSrc) s+='<span><i class="dot gb"></i>国标</span><span><i class="dot cc"></i>考场</span><span><i class="dot zl"></i>整理</span>';
  return s+'</div>';
}
function srcBadge(s){return '<span class="srcbadge '+s+'">'+({gb:'国标',cc:'考场',zl:'整理'})[s]+'</span>'}

function renderControls(){
  var el=document.getElementById('controls');
  if(current==='综合评判'){ el.innerHTML='<div class="toolbar">'+legendHTML(false)+'</div>'; return; }
  if(current==='16项专项'){
    el.innerHTML='<div class="toolbar">'+legendHTML(true)+'<div class="filter'+(onlyFail?' on':'')+'" id="flt"><i class="sw"></i>只看一票否决</div></div>';
    document.getElementById('flt').onclick=function(){onlyFail=!onlyFail; render();}; return;
  }
  var steps=DATA.routes[current], total=steps.length, done=0;
  for(var i=0;i<total;i++) if(store.get(dk(current,i))==='1') done++;
  var pct=Math.round(done/total*100);
  el.innerHTML='<div class="toolbar">'+legendHTML(false)+'<div class="filter'+(onlyFail?' on':'')+'" id="flt"><i class="sw"></i>只看一票否决</div></div>'+
    '<div class="progress"><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div><div class="ptext">已掌握 <b>'+done+'</b> / '+total+' 步 · 点右上圆圈标记</div></div>';
  document.getElementById('flt').onclick=function(){onlyFail=!onlyFail; render();};
}

function renderComp(){
  var lis=DATA.comp.map(function(c){
    return '<li class="'+(c.star?'star':'')+'"><div class="top"><div class="ct">'+(c.star?'★ ':'')+esc(c.t)+'</div>'+srcBadge(c.src)+'</div>'+
      (c.note?'<div class="cn">'+esc(c.note)+'</div>':'')+'</li>';
  }).join('');
  document.getElementById('view').innerHTML=srcNote()+'<ul class="comp">'+lis+'</ul>';
}
function penRow(p){
  return '<li class="pen2 tier-'+p.tier+(p.star?' star':'')+'"><span class="pill '+p.tier+'">'+TL[p.tier]+'</span>'+
    '<span class="txt">'+esc(p.t)+(p.star?'<span class="star-tag">★ 失分点</span>':'')+'</span>'+srcBadge(p.src||'gb')+'</li>';
}
function renderProj(){
  var html=srcNote()+'<div class="proj'+(onlyFail?' only-fail':'')+'">';
  DATA.proj.forEach(function(pr){
    html+='<section class="msec"><div class="mbanner"><span class="mname">'+esc(pr.title)+'</span></div>';
    html+='<ul class="pens2">'+pr.items.map(penRow).join('')+'</ul>';
    if(pr.note) html+='<div class="pnote"><b>备注：</b>'+esc(pr.note)+'</div>';
    html+='</section>';
  });
  html+='</div>';
  document.getElementById('view').innerHTML=html;
}
function penHTML(p){
  return '<li class="pen tier-'+p.tier+(p.star?' star':'')+'"><span class="pill '+p.tier+'">'+TL[p.tier]+'</span>'+
    '<span class="ptxt">'+esc(p.t)+(p.star?'<span class="star-tag">★ 失分点</span>':'')+'</span></li>';
}
function stepHTML(st,i){
  var isDone=store.get(dk(current,i))==='1';
  return '<div class="step'+(isDone?' done':'')+'"><div class="node">'+(i+1)+'</div><div class="card">'+
    '<div class="chead"><div class="cname">'+esc(st.name)+'</div><button class="mark" data-i="'+i+'" title="标记已掌握" aria-label="标记已掌握">'+(isDone?'✓':'')+'</button></div>'+
    '<div class="voice"><span class="vtag'+(st.silent?' silent':'')+'">'+(st.silent?'无语音':'语音')+'</span><span>'+esc(st.voice)+'</span></div>'+
    '<div class="act"><span class="lab">关键动作</span>'+esc(st.action)+'</div>'+
    '<ul class="pens"><div class="plab">本步专项扣分（依据国标 GA 1026）</div>'+st.pens.map(penHTML).join('')+'</ul>'+
    (st.note?'<div class="rnote">'+esc(st.note).replace(/★/g,'<b>★</b>')+'</div>':'')+
  '</div></div>';
}
function renderRoute(){
  var steps=DATA.routes[current], html='<div class="route'+(onlyFail?' only-fail':'')+'">';
  steps.forEach(function(st,i){ html+=stepHTML(st,i); });
  html+='</div>';
  var view=document.getElementById('view'); view.innerHTML=html;
  view.querySelectorAll('.mark').forEach(function(m){
    m.onclick=function(){ var i=this.getAttribute('data-i'); var k=dk(current,i);
      store.set(k, store.get(k)==='1'?'0':'1'); render(); };
  });
}
function render(){
  renderTabs(); renderControls();
  if(current==='综合评判') renderComp();
  else if(current==='16项专项') renderProj();
  else renderRoute();
  window.scrollTo({top:0});
}
render();
</script>
</body>
