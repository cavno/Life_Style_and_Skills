<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报单管理系统 · P0 演示原型</title>
<style>
:root{--bg:#F3EAD3;--card:#FBF5E4;--ink:#2E2A21;--teal:#3F7E6B;--terra:#BC4B33;--gold:#B08A3E;--line:#DACDA6;--muted:#7C7360;}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",STSong,"SimSun",serif;font-size:15px;line-height:1.7}
a{color:var(--teal)}
h1,h2,h3{margin:8px 0;letter-spacing:.02em}
h2{font-size:19px;color:var(--teal)}
h3{font-size:15.5px}
.btn{display:inline-block;border:1.5px solid var(--teal);color:var(--teal);background:#fff;border-radius:8px;padding:7px 16px;font:inherit;font-size:14px;cursor:pointer;text-decoration:none;line-height:1.4}
.btn.pri{background:var(--teal);color:#fff}
.btn.dan{border-color:var(--terra);color:var(--terra)}
.btn.dan.pri{background:var(--terra);color:#fff}
.btn.sm{padding:3px 10px;font-size:12.5px;border-radius:6px}
.btn.blk{display:block;width:100%;text-align:center}
.btn:disabled{opacity:.45;cursor:not-allowed}
.f{margin:11px 0}
.f label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
input,select,textarea{width:100%;font:inherit;font-size:14.5px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
textarea{min-height:90px}
input[type=checkbox]{width:auto;transform:scale(1.15);margin-right:6px}
.ck{display:block;font-size:13.5px;margin:7px 0}
.hint{font-size:12.5px;color:#8A6D2E;background:#F6EFD8;border-left:3px solid var(--gold);padding:5px 8px;border-radius:4px;margin-top:4px}
.chip{display:inline-block;font-size:12px;border-radius:999px;padding:1.5px 10px;border:1.3px solid;white-space:nowrap}
.s-ok{background:var(--teal);border-color:var(--teal);color:#fff}
.s-teal{color:var(--teal);border-color:var(--teal);background:#EDF3EE}
.s-gold{color:#8A6D2E;border-color:var(--gold);background:#F6EFD8}
.s-bad{color:var(--terra);border-color:var(--terra);background:#F8E6DE}
.s-ink{color:var(--muted);border-color:var(--line);background:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:10px 0}
.tb{width:100%;border-collapse:collapse;font-size:13px;background:#fff;margin:8px 0}
.tb th,.tb td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
.tb th{background:#EEE3C4;white-space:nowrap;color:#57503B}
.kv{display:flex;font-size:13.5px;padding:4px 0;border-bottom:1px dashed #E7DDBE}
.kv b{width:96px;color:var(--muted);font-weight:400;flex:none}
.kv span{word-break:break-all}
.tl{margin:8px 0 8px 6px;padding-left:14px;border-left:2px solid var(--line)}
.tl .it{position:relative;margin:0 0 10px;font-size:13px}
.tl .it::before{content:'';position:absolute;left:-20px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--teal)}
.tl .it.bad::before{background:var(--terra)}
.tl .tm{color:var(--muted);font-size:11.5px}
.mask{position:fixed;inset:0;background:rgba(40,35,20,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.box{background:var(--card);border-radius:12px;max-width:560px;width:100%;max-height:86vh;overflow:auto;padding:18px 20px;border:1px solid var(--line)}
.toastw{position:fixed;top:14px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:99;pointer-events:none}
.toast{background:var(--teal);color:#fff;border-radius:8px;padding:8px 18px;font-size:13.5px;margin-bottom:8px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.err{background:var(--terra)}
.badge{background:var(--terra);color:#fff;font-size:10.5px;border-radius:999px;padding:0 6px;margin-left:6px;vertical-align:middle;display:inline-block;line-height:1.6}
.ush{max-width:470px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.utop{position:sticky;top:0;background:var(--teal);color:#fff;padding:11px 14px;font-size:16px;display:flex;align-items:center;gap:10px;z-index:5}
.utop .bk{cursor:pointer;font-size:18px;line-height:1}
.ubody{flex:1;padding:12px 14px 78px}
.utab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:470px;display:flex;background:#fff;border-top:1px solid var(--line);z-index:6}
.utab a{flex:1;text-align:center;padding:9px 0 10px;font-size:13.5px;color:var(--muted);text-decoration:none}
.utab a.on{color:var(--teal);font-weight:700}
.ash{display:flex;min-height:100vh}
.aside{width:196px;flex:none;background:#2F4A41;color:#EDE6D2;padding:16px 0}
.aside .lg{font-size:17px;padding:0 18px 12px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:8px}
.aside a{display:block;color:#CDE0D6;text-decoration:none;padding:8px 18px;font-size:14px}
.aside a.on,.aside a:hover{background:rgba(255,255,255,.12);color:#fff}
.amain{flex:1;padding:18px 22px;min-width:0}
.stats{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:118px}
.stat .n{font-size:21px;color:var(--teal);font-weight:700}
.stat .n.bad{color:var(--terra)}
.stat .l{font-size:12px;color:var(--muted)}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;align-items:center}
.frow>*{flex:1;min-width:104px}
.frow .btn{flex:none}
.empty{color:var(--muted);text-align:center;padding:28px 0;font-size:13.5px}
.imgv{max-width:100%;border:1px solid var(--line);border-radius:8px;cursor:zoom-in;display:block}
.risk-p{border-left:3px solid var(--gold);background:#F6EFD8;padding:8px 10px;font-size:12.8px;border-radius:4px;margin:8px 0}
.note{border-left:4px solid var(--teal);background:#E9F0EA;border-radius:6px;padding:9px 13px;margin:10px 0;font-size:13px}
.warnb{border-left:4px solid var(--terra);background:#F8E6DE;border-radius:6px;padding:9px 13px;margin:10px 0;font-size:13px}
.land{max-width:760px;margin:0 auto;padding:48px 20px}
.land .ttl{font-size:26px;text-align:center}
.land .sub{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:22px}
.gates{display:flex;gap:16px;flex-wrap:wrap}
.gate{flex:1;min-width:250px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:20px;cursor:pointer}
.gate:hover{border-color:var(--teal)}
.gate h3{color:var(--teal);font-size:17px;margin-top:0}
.gate .dm{font-size:12.5px;color:var(--muted)}
.mini{font-size:12.5px;color:var(--muted)}
.rowline{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.menu{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:10px 0}
.menu a{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;color:var(--ink);text-decoration:none;border-bottom:1px solid #EFE7CC;font-size:14.5px}
.menu a:last-child{border-bottom:none}
.menu a:hover{background:#FBF7EA}
@media(max-width:760px){.ash{flex-direction:column}.aside{width:100%;display:flex;flex-wrap:wrap;padding:6px}.aside .lg{border:none;width:100%;padding:8px 12px 4px}.aside a{padding:6px 12px;font-size:13px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<div class="toastw" id="toastw"></div>
<script>
/* ============ 报单管理系统 P0 演示原型 ============
   纯静态单文件:数据存于浏览器 localStorage(不可用时退化为内存),
   生产化路径见 PRD §8:将 DB/save/load 层替换为 REST API 即可。 */

/* ---------- 常量 ---------- */
const LS_KEY='bd_p0_v1', SES_KEY='bd_p0_ses';
const MATS=['尾款图','物流单号','评价图','完成图'];
const STATUSES=['已报单','已跟单','已丢单','尾款图待传','物流单号待传','评价图待传','完成图待传','返款待审核','返款已审核通过','返款未审核通过','已返款'];
const REJECTS=['截图不全','金额不符','未用券','备注错误','使用返利软件','其他'];
const VIOTYPES=['申请保价','随意退款','使用返利软件','串ID/批量地址','其他'];
const ADMIN={acc:'admin',pwd:'admin123'};
const NOTICE9=['下单后请及时报单,逾期不予结算。','报单截图必须为完整长图,需露出:收货地址、店铺名、商品、用券情况、实付款金额、订单号、下单时间。','活动要求备注的,截图必须露出备注内容。','使用专属券+备注的项目,提交前自行核对用券、备注、订单号、金额四项是否正确;不用券、无备注、备注错误均不予结算。','使用购物金的项目,购物金实付款必须露出。','禁止使用任何返利软件。','所有订单不可申请保价;申请保价不予结算,已返款的须退回。','禁止随意退款、串ID及批量地址下单。','任何违反上述要求的情况,已发放的返款将被追回。'].join('\n');

/* ---------- 存储层(生产化时整体替换为 API) ---------- */
const store=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return localStorage}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v)},removeItem:k=>{delete m[k]}}}})();
let DB=null;
function save(){try{store.setItem(LS_KEY,JSON.stringify(DB))}catch(e){toast('浏览器存储空间不足:截图过大或数据过多,请重置演示数据','err')}}
function load(){const raw=store.getItem(LS_KEY);if(raw){try{DB=JSON.parse(raw)}catch(e){DB=null}}if(!DB)DB=seed();save()}
function getSes(){try{return JSON.parse(store.getItem(SES_KEY)||'null')}catch(e){return null}}
function setSes(s){s?store.setItem(SES_KEY,JSON.stringify(s)):store.removeItem(SES_KEY)}

/* ---------- 工具 ---------- */
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,10);
const now=()=>Date.now();
const D=864e5,H=36e5;
const pad=n=>String(n).padStart(2,'0');
const fmt=t=>{if(!t)return'—';const d=new Date(t);return (d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())};
const fmtD=t=>{const d=new Date(t);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())};
const yuan=n=>'¥'+(+n||0).toFixed(2);
const pct=n=>((+n||0)*100).toFixed(1)+'%';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const maskP=p=>p?String(p).replace(/^(\d{3})\d{4}(\d{4})$/,'$1****$2'):'';
const maskA=a=>{a=String(a||'');return a.length>6?a.slice(0,3)+'****'+a.slice(-3):a};
function stCls(s){if(s==='已返款'||s==='返款已审核通过')return's-ok';if(s==='已丢单'||s==='返款未审核通过')return's-bad';if((s||'').endsWith('待传'))return's-gold';if(s==='返款待审核'||s==='已跟单')return's-teal';return's-ink'}
const chip=s=>'<span class="chip '+stCls(s)+'">'+esc(s)+'</span>';
function toast(msg,type){const w=$('#toastw');const d=document.createElement('div');d.className='toast'+(type==='err'?' err':'');d.textContent=msg;w.appendChild(d);setTimeout(()=>d.remove(),2600)}
function modal(html){$('#modal').innerHTML='<div class="mask" onclick="if(event.target===this)A.closeM()"><div class="box">'+html+'</div></div>'}
function closeM(){$('#modal').innerHTML=''}
function dlFile(name,content,type){const b=new Blob([content],{type:type||'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000)}
function dlCSV(name,rows){dlFile(name,'\ufeff'+rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\n'),'text/csv')}

/* ---------- 领域查询 ---------- */
const actOf=r=>DB.activities.find(a=>a.id===r.actId);
const usrOf=id=>DB.users.find(u=>u.id===id);
const repOf=id=>DB.reports.find(r=>r.id===id);
function curUser(){const s=getSes();return s&&s.role==='user'?usrOf(s.uid):null}
function isAdmin(){const s=getSes();return!!(s&&s.role==='admin')}
function nextCode(){DB.seq.report++;const d=new Date();return'BD'+String(d.getFullYear()).slice(2)+pad(d.getMonth()+1)+pad(d.getDate())+'-'+String(DB.seq.report).padStart(4,'0')}
function defRebate(r,a){if(!a)return 0;const v=a.rebateType==='pct'?Math.min(r.amount*a.rebateVal/100,(+a.rebateCap||1e9)):+a.rebateVal;return Math.round(v*100)/100}
function pendingMat(r,a){for(const m of(a&&a.materials||[])){if(!(r.materials&&r.materials[m]&&r.materials[m].v))return m}return null}
function unreadN(u){return DB.notices.filter(n=>n.userId===u.id&&!n.read).length}
function todosOf(u){const rs=DB.reports.filter(r=>r.userId===u.id);return{gates:rs.filter(r=>r.status.endsWith('待传')),rej:rs.filter(r=>r.status==='返款未审核通过'),appeal:rs.filter(r=>r.status==='已丢单'&&r.appeal&&!r.appeal.used)}}
function notify(userId,reportId,type,content){DB.notices.unshift({id:uid(),userId,reportId,type,content,read:false,at:now()})}
function oplog(op,action,detail){DB.oplogs.unshift({at:now(),op,action,detail:detail||''})}

/* ---------- 状态机核心(与 PRD §4 一致) ---------- */
function setStatus(r,to,op,note){const from=r.status||null;r.status=to;r.logs.push({from,to,op,note:note||'',at:now()});oplog(op,'状态 '+(from||'新建')+' → '+to,r.code+(note?' · '+note:''))}
function advanceAfterFollow(r,op){const a=actOf(r);setStatus(r,'已跟单',op||'管理员','渠道核对命中');const m=pendingMat(r,a);setStatus(r,m?m+'待传':'返款待审核','系统',m?'素材闸门:待传 '+m:'素材齐/无素材要求');notify(r.userId,r.id,'跟单','报单 '+r.code+' 已跟单'+(m?',请补传:'+m:',已进入返款审核'))}
function markLost(r,op,note){setStatus(r,'已丢单',op||'管理员',note||'渠道核对不到');notify(r.userId,r.id,'丢单','报单 '+r.code+' 已丢单('+(note||'渠道核对不到')+'),可在订单详情申诉一次')}
function submitMaterial(r,m,val){r.materials=r.materials||{};r.materials[m]={v:val,at:now()};const a=actOf(r);const nx=pendingMat(r,a);setStatus(r,nx?nx+'待传':'返款待审核','用户','完成:'+m)}
function approve(r,amount,op){r.rebate=Math.round((+amount)*100)/100;setStatus(r,'返款已审核通过',op||'管理员','返款 '+yuan(r.rebate));notify(r.userId,r.id,'审核','报单 '+r.code+' 审核通过,返款 '+yuan(r.rebate)+',待打款')}
function reject(r,reason,op){r.rejectReason=reason;setStatus(r,'返款未审核通过',op||'管理员',reason);notify(r.userId,r.id,'驳回','报单 '+r.code+' 审核未通过:'+reason+'。请修改后重新提交')}

/* ---------- 财务与收益口径(PRD §6.5 / §5.6) ---------- */
function finOf(a){const rs=DB.reports.filter(r=>r.actId===a.id);const followed=rs.filter(r=>r.logs.some(l=>l.to==='已跟单'));const lost=rs.filter(r=>r.status==='已丢单');const paidRs=rs.filter(r=>r.status==='已返款');const paidSum=paidRs.reduce((s,r)=>s+(+r.rebate||0),0);const claws=DB.clawbacks.filter(c=>rs.some(r=>r.id===c.reportId));const back=claws.filter(c=>c.status==='已追回').reduce((s,c)=>s+(+c.amount||0),0);const bad=claws.filter(c=>c.status==='坏账').reduce((s,c)=>s+(+c.amount||0),0);const way=rs.filter(r=>r.status==='返款已审核通过').reduce((s,r)=>s+(+r.rebate||0),0)+rs.filter(r=>r.status==='返款待审核').reduce((s,r)=>s+defRebate(r,a),0);const rejN=rs.reduce((s,r)=>s+r.logs.filter(l=>l.to==='返款未审核通过').length,0);const audN=rs.reduce((s,r)=>s+r.logs.filter(l=>l.from==='返款待审核'&&(l.to==='返款已审核通过'||l.to==='返款未审核通过')).length,0);const income=+a.incomeTotal||0;const net=income-(paidSum-back);return{total:rs.length,eff:followed.length,lost:lost.length,lostRate:rs.length?lost.length/rs.length:0,rejRate:audN?rejN/audN:0,paidSum,way,back,bad,income,net,per:followed.length?net/followed.length:0,roi:paidSum?net/paidSum:0}}
function incomeOf(u){const rs=DB.reports.filter(r=>r.userId===u.id);const done=rs.filter(r=>r.status==='已返款');const d0=new Date();const mS=new Date(d0.getFullYear(),d0.getMonth(),1).getTime();return{done:done.reduce((s,r)=>s+(+r.rebate||0),0),month:done.filter(r=>r.paidAt>=mS).reduce((s,r)=>s+(+r.rebate||0),0),way:rs.filter(r=>r.status==='返款已审核通过').reduce((s,r)=>s+(+r.rebate||0),0)+rs.filter(r=>r.status==='返款待审核').reduce((s,r)=>s+defRebate(r,actOf(r)),0),rs}}

/* ---------- 批量单号解析(PRD §5.4) ---------- */
function parseOrderNos(text){const raw=String(text||'').split(/[\s,;，；、|]+/).map(s=>s.trim()).filter(Boolean);const seen=new Set(),ok=[],bad=[];for(const t of raw){if(seen.has(t))continue;seen.add(t);if(/^[A-Za-z0-9\-_]{6,32}$/.test(t)&&!/[\u4e00-\u9fff]/.test(t))ok.push(t);else bad.push(t)}return{ok:ok.slice(0,500),bad,over:Math.max(0,ok.length-500)}}

/* ---------- 截图自动拼图(PRD §5.3) ---------- */
function readImg(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=fr.result};fr.onerror=rej;fr.readAsDataURL(file)})}
async function stitchFiles(files,W,q){W=W||640;q=q||0.62;const imgs=[];for(const f of files)imgs.push(await readImg(f));const c=document.createElement('canvas');c.width=W;c.height=imgs.reduce((s,im)=>s+Math.max(1,Math.round(im.height*W/im.width)),0);const g=c.getContext('2d');g.fillStyle='#fff';g.fillRect(0,0,c.width,c.height);let y=0;for(const im of imgs){const h=Math.max(1,Math.round(im.height*W/im.width));g.drawImage(im,0,y,W,h);y+=h}let d=c.toDataURL('image/jpeg',q);if(d.length>900*1024)d=c.toDataURL('image/jpeg',0.4);if(d.length>1500*1024){const c2=document.createElement('canvas');const k=480/W;c2.width=480;c2.height=Math.round(c.height*k);c2.getContext('2d').drawImage(c,0,0,c2.width,c2.height);d=c2.toDataURL('image/jpeg',0.4)}return d}

function repCard(r){const a=actOf(r);return '<div class="card" style="cursor:pointer" onclick="A.go(\'u/order/'+r.id+'\')"><div class="rowline"><b>'+esc(r.code)+'</b>'+chip(r.status)+'</div><div class="mini" style="word-break:break-all">单号 '+esc(r.orderNo)+'</div><div class="mini">'+esc(a?a.name:'')+' · 实付 '+yuan(r.amount)+(r.rebate?' · 返款 '+yuan(r.rebate):'')+' · '+fmt(r.createdAt)+'</div></div>'}
function filteredReports(u){let rs=DB.reports.filter(r=>r.userId===u.id);const f=TMP.of;
 if(TMP.nos)rs=rs.filter(r=>TMP.nos.includes(r.orderNo));

 if(done){const isImg=String(done.v||r.materials[m].v).startsWith('data:');const v=r.materials[m];return '<div class="kv"><b>'+m+'</b><span>✓ 已提交 '+fmt(v.at)+(m==='物流单号'?' · '+esc(v.v):'')+(isImg?' <button class="btn sm" onclick="A.zoomMat(\''+r.id+'\',\''+m+'\')">查看</button>':'')+'</span></div>'}
 if(cur){if(m==='物流单号')return '<div class="kv"><b>'+m+'</b><span style="flex:1"><input id="mtxt" placeholder="填写快递单号" style="margin-bottom:6px"><button class="btn sm pri" onclick="A.matText(\''+r.id+'\')">提交</button></span></div>';
  return '<div class="kv"><b>'+m+'</b><span style="flex:1"><input type="file" multiple accept="image/*" onchange="A.matImg(this,\''+r.id+'\',\''+m+'\')"><span class="mini">选择后自动拼接并提交</span></span></div>'}
 return '<div class="kv"><b>'+m+'</b><span class="mini">'+(r.logs.some(l=>l.to==='已跟单')?'等待前项完成':'待跟单后开放')+'</span></div>'}
function vUOrder(id){const u=curUser();const r=repOf(id);if(!r||r.userId!==u.id)return '<div class="empty">订单不存在</div>';const a=actOf(r);
 let html='<div class="card"><div class="rowline"><b>'+esc(r.code)+'</b>'+chip(r.status)+'</div>'
 +[['订单号',r.orderNo],['活动',a?a.name:''],['实付金额',yuan(r.amount)],['返款金额',r.rebate?yuan(r.rebate):'待审核确定'],['微信号',r.wechat],['备注',r.remark||'—'],['报单时间',fmt(r.createdAt)]].map(k=>'<div class="kv"><b>'+k[0]+'</b><span>'+esc(k[1])+'</span></div>').join('')+'</div>';
 if(r.status==='返款未审核通过')html+='<div class="warnb"><b>审核未通过:</b>'+esc(r.rejectReason||'')+(r.violation?'(违规判定)':'')+'</div>'+(r.violation?'':'<div class="card"><h3 style="margin-top:0">整改后重新提交</h3><div class="f"><label>实付金额</label><input id="ramt" value="'+r.amount+'"></div><div class="f"><label>备注</label><input id="rrm" value="'+esc(r.remark)+'"></div><div class="f"><label>重新上传截图(可选,不选则保留原图)</label><input type="file" multiple accept="image/*" onchange="A.pickR(this)"></div><button class="btn pri blk" onclick="A.resubmit(\''+r.id+'\')">重新提交审核</button></div>');
 if(r.status==='已丢单'){if(!r.appeal)html+='<div class="card"><h3 style="margin-top:0">丢单申诉(限一次)</h3><textarea id="aptxt" placeholder="说明订单有效的依据,如下单时间、券码使用记录等"></textarea><button class="btn blk" style="margin-top:8px" onclick="A.appeal(\''+r.id+'\')">提交申诉</button></div>';
  else if(!r.appeal.used)html+='<div class="note">申诉已提交('+fmt(r.appeal.at)+'),等待管理员核实。</div>';
  else html+='<div class="note">申诉已处理,结果见状态与通知。</div>'}

 html+='<div class="card"><h3 style="margin-top:0">状态时间线</h3><div class="tl">'+r.logs.map(l=>'<div class="it'+((l.to==='已丢单'||l.to==='返款未审核通过')?' bad':'')+'"><b>'+esc(l.to)+'</b> <span class="mini">'+esc(l.op)+(l.note?' · '+esc(l.note):'')+'</span><div class="tm">'+fmt(l.at)+'</div></div>').join('')+'</div></div>';

 else if(!/^[A-Za-z0-9\-_]{6,32}$/.test(v))h='格式疑似有误:仅限 6–32 位字母数字';
 else if(a&&(a.platform==='天猫'||a.platform==='淘宝')&&!/^\d{16,22}$/.test(v))h='淘系订单号通常为 16–22 位纯数字,请核对'}
 $('#hno').innerHTML=h?'<div class="hint">'+esc(h)+'</div>':''},
hintAmt(inp,actId){const a=DB.activities.find(x=>x.id===actId);const v=+inp.value;let h='';if(a&&a.refPrice&&v>0){const dev=Math.abs(v-a.refPrice)/a.refPrice;if(dev>0.3)h='金额偏离参考价 '+pct(dev)+',请确认无误(不拦截)'}$('#hamt').innerHTML=h?'<div class="hint">'+esc(h)+'</div>':''},
hintRm(inp,actId){const a=DB.activities.find(x=>x.id===actId);const v=inp.value.trim();let h='';if(a&&a.remarkTpl&&v&&!v.includes(a.remarkTpl))h='与指定备注「'+a.remarkTpl+'」不一致,请核对';$('#hrm').innerHTML=h?'<div class="hint">'+esc(h)+'</div>':''},
async pickImgs(inp){const fs=Array.from(inp.files||[]);if(!fs.length)return;if(fs.length>9)return toast('最多 9 张','err');toast('正在拼接 '+fs.length+' 张截图…');
 try{TMP.img=await stitchFiles(fs);TMP.imgN=fs.length;$('#imgPrev').innerHTML='<img class="imgv" src="'+TMP.img+'" onclick="A.zoom(this.src)"><div class="mini">已拼接 '+fs.length+' 张,点击可预览;重新选择将覆盖</div>'}catch(e){toast('拼接失败,请重试或减少图片数量','err')}},
submitReport(actId){const a=DB.activities.find(x=>x.id===actId);const u=curUser();if(!a||a.status!=='进行中')return toast('活动不在进行中','err');
 const no=$('#nno').value.trim(),amt=+$('#namt').value,wx=$('#nwx').value.trim(),rm=$('#nrm').value.trim();
 if(!/^[A-Za-z0-9\-_]{6,32}$/.test(no))return toast('订单号格式不正确','err');
 if(DB.reports.some(r=>r.orderNo===no))return toast('该订单号已报单,禁止重复提交','err');
 if(!(amt>0))return toast('请填写正确的实付金额','err');
 if(!wx)return toast('请填写微信号','err');
 if(wx!==u.wechat&&!confirm('微信号与注册绑定('+u.wechat+')不一致,确认继续?'))return;
 if(a.remarkTpl&&!rm)return toast('本活动要求填写备注','err');
 if(!TMP.img)return toast('请上传订单截图','err');
 const cks=document.querySelectorAll('.ckq');for(const c of cks)if(!c.checked)return toast('请逐项完成提交前自检','err');
 const r={id:uid(),code:nextCode(),userId:u.id,actId:a.id,orderNo:no,amount:Math.round(amt*100)/100,wechat:wx,remark:rm,img:TMP.img,imgCount:TMP.imgN,status:'',rejectReason:'',rebate:0,materials:{},batchId:'',violation:false,appeal:null,createdAt:now(),paidAt:0,logs:[]};
 setStatus(r,'已报单','用户');DB.reports.push(r);save();TMP.img=null;TMP.imgN=0;TMP.newFor='';toast('报单成功:'+r.code);go('u/order/'+r.id)},
/* 用户端:查询与补传 */
setOF(k,v){TMP.of[k]=v;route()},
batchModal(){modal(vBatchModal())},
prevNos(){const p=parseOrderNos($('#bnos').value);$('#bprev').innerHTML='解析出 <b>'+p.ok.length+'</b> 个有效单号'+(p.bad.length?',忽略 '+p.bad.length+' 个无效项':'')+(p.over?';超出上限 500,已截断 '+p.over+' 个':'')},
applyNos(){const p=parseOrderNos($('#bnos').value);if(!p.ok.length)return toast('未解析到有效单号','err');TMP.nos=p.ok;closeM();toast('已按 '+p.ok.length+' 个单号过滤');route()},
clearNos(){TMP.nos=null;route()},
expOrders(){const u=curUser();const rs=filteredReports(u);dlCSV('我的报单-'+fmtD(now())+'.csv',[['报单编号','订单号','活动','实付','返款','状态','报单时间']].concat(rs.map(r=>[r.code,r.orderNo,(actOf(r)||{}).name||'',r.amount,r.rebate||'',r.status,fmtD(r.createdAt)+' '+fmt(r.createdAt).slice(-5)])));toast('已导出 '+rs.length+' 条')},
matText(id){const r=repOf(id);const v=($('#mtxt').value||'').trim();if(!/^[A-Za-z0-9]{8,24}$/.test(v))return toast('快递单号格式疑似有误(8–24 位字母数字)','err');submitMaterial(r,'物流单号',v);save();toast('物流单号已提交');route()},
async matImg(inp,id,m){const fs=Array.from(inp.files||[]);if(!fs.length)return;if(fs.length>9)return toast('最多 9 张','err');toast('正在拼接并提交…');try{const d=await stitchFiles(fs);const r=repOf(id);submitMaterial(r,m,d);save();toast(m+' 已提交');route()}catch(e){toast('处理失败,请重试','err')}},
async pickR(inp){const fs=Array.from(inp.files||[]);if(!fs.length)return;try{TMP.rimg=await stitchFiles(fs);toast('新截图已拼接,提交时生效')}catch(e){toast('拼接失败','err')}},
resubmit(id){const r=repOf(id);const amt=+$('#ramt').value,rm=$('#rrm').value.trim();if(!(amt>0))return toast('金额不正确','err');const a=actOf(r);if(a&&a.remarkTpl&&!rm)return toast('本活动要求填写备注','err');r.amount=Math.round(amt*100)/100;r.remark=rm;if(TMP.rimg){r.img=TMP.rimg;TMP.rimg=null}r.rejectReason='';setStatus(r,'返款待审核','用户','整改重提');save();toast('已重新提交审核');route()},
appeal(id){const r=repOf(id);const t=($('#aptxt').value||'').trim();if(!t)return toast('请填写申诉理由','err');r.appeal={txt:t,at:now(),used:false};oplog('用户','丢单申诉',r.code);save();toast('申诉已提交');route()},
openN(id){const n=DB.notices.find(x=>x.id===id);if(!n)return;n.read=true;save();if(n.reportId&&repOf(n.reportId))go('u/order/'+n.reportId);else route()},
/* 管理端 */
aLogin(){if($('#aacc').value.trim()!==ADMIN.acc||$('#apwd').value!==ADMIN.pwd)return toast('账号或密码不正确','err');setSes({role:'admin'});toast('管理员已登录');go('a/home')},
actOn(id){const a=DB.activities.find(x=>x.id===id);a.status='进行中';oplog('管理员','活动上线',a.name);save();route()},
actEnd(id){const a=DB.activities.find(x=>x.id===id);if(!confirm('结束活动「'+a.name+'」?结束后不可新增报单。'))return;a.status='已结束';oplog('管理员','活动结束',a.name);save();route()},
saveAct(id){const g=i=>$('#'+i).value;const name=g('ename').trim();if(!name)return toast('请填写活动名称','err');
 const st=new Date(g('est')).getTime(),et=new Date(g('eet')).getTime()+D-1;if(!(st>0&&et>st))return toast('起止日期不正确','err');
 const rv=+g('erv');if(!(rv>0))return toast('返款值必须大于 0','err');
 const mats=MATS.filter(m=>Array.from(document.querySelectorAll('.emat:checked')).some(c=>c.value===m));
 const o={name,platform:g('eplat'),shop:g('eshop').trim(),product:g('eprod').trim(),refPrice:+g('eref')||0,startAt:st,endAt:et,rebateType:g('erty'),rebateVal:rv,rebateCap:+g('ecap')||0,materials:mats,couponInfo:g('ecp').trim(),remarkTpl:g('erm').trim(),useGouwujin:$('#egw').checked,notice:g('entc').trim()||NOTICE9,incomeTotal:+g('einc')||0,status:g('estt')};
 if(id==='new'){o.id=uid();o.createdAt=now();DB.activities.unshift(o);oplog('管理员','新建活动',o.name)}else{const a=DB.activities.find(x=>x.id===id);Object.assign(a,o);oplog('管理员','编辑活动',a.name)}
 save();toast('活动已保存');go('a/acts')},
follow(){const ids=Array.from(document.querySelectorAll('.ckfw:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选报单','err');ids.forEach(id=>advanceAfterFollow(repOf(id),'管理员'));save();toast('已跟单 '+ids.length+' 笔');route()},
lost(){const ids=Array.from(document.querySelectorAll('.ckfw:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选报单','err');if(!confirm('确认将 '+ids.length+' 笔标记为已丢单?'))return;ids.forEach(id=>markLost(repOf(id),'管理员'));save();toast('已标记丢单 '+ids.length+' 笔');route()},
appealOk(id){const r=repOf(id);setStatus(r,'已报单','管理员','申诉通过');r.appeal.used=true;notify(r.userId,r.id,'申诉','报单 '+r.code+' 申诉通过,已重新进入跟单核对');save();toast('已改回已报单');route()},
appealNo(id){const r=repOf(id);r.appeal.used=true;oplog('管理员','驳回申诉',r.code);notify(r.userId,r.id,'申诉','报单 '+r.code+' 申诉未通过,维持已丢单');save();toast('已驳回申诉');route()},
setRF(v){TMP.rf=v;route()},
batchApprove(){const ids=Array.from(document.querySelectorAll('.ckrev:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选','err');let sum=0;ids.forEach(id=>{const r=repOf(id);const amt=defRebate(r,actOf(r));approve(r,amt);sum+=amt});save();toast('批量通过 '+ids.length+' 笔,合计 '+yuan(sum));route()},
doApprove(id){const r=repOf(id);const amt=+$('#vamt').value;if(!(amt>0))return toast('返款金额不正确','err');approve(r,amt);save();toast('已通过:'+yuan(amt));go('a/review')},
doReject(id){const r=repOf(id);const reason=$('#vrs').value+(($('#vrx').value||'').trim()?':'+$('#vrx').value.trim():'');reject(r,reason);save();toast('已驳回');go('a/review')},
vioModal(id){modal('<h3 style="margin-top:0">判定违规</h3><div class="f"><label>违规类型</label><select id="vio">'+VIOTYPES.map(x=>'<option>'+x+'</option>').join('')+'</select></div><div class="f"><label>补充说明(选填)</label><input id="viox"></div><p class="mini">未返款:置「返款未审核通过·违规」不予结算;已返款:生成追回单进入台账。</p><div class="frow"><button class="btn dan pri" onclick="A.doVio(\''+id+'\')">确认判定</button><button class="btn" onclick="A.closeM()">取消</button></div>')},
doVio(id){const r=repOf(id);const reason=$('#vio').value+(($('#viox').value||'').trim()?':'+$('#viox').value.trim():'');r.violation=true;
 if(r.status==='已返款'){DB.clawbacks.unshift({id:uid(),reportId:r.id,amount:+r.rebate||0,status:'待追回',reason,at:now()});oplog('管理员','判定违规并建追回单',r.code+' · '+reason+' '+yuan(r.rebate));notify(r.userId,r.id,'追回','报单 '+r.code+' 判定违规('+reason+'),返款 '+yuan(r.rebate)+' 须退回')}
 else{r.rejectReason='违规:'+reason;setStatus(r,'返款未审核通过','管理员','违规:'+reason);notify(r.userId,r.id,'违规','报单 '+r.code+' 判定违规('+reason+'),不予结算')}
 closeM();save();toast('已判定违规');route()},
mkBatch(){const ids=Array.from(document.querySelectorAll('.ckpay:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选','err');DB.seq.batch++;const total=ids.reduce((s,id)=>s+(+repOf(id).rebate||0),0);const b={id:uid(),code:'PB-'+String(DB.seq.batch).padStart(4,'0'),ids,count:ids.length,total:Math.round(total*100)/100,status:'待打款',createdAt:now(),paidAt:0,operator:'管理员'};ids.forEach(id=>{repOf(id).batchId=b.id});DB.batches.unshift(b);oplog('管理员','生成打款批次',b.code+' · '+b.count+' 笔 '+yuan(b.total));save();toast('批次 '+b.code+' 已生成,可导出 CSV');route()},
batchCSV(bid){const b=DB.batches.find(x=>x.id===bid);dlCSV(b.code+'.csv',[['支付宝账号','姓名','金额','备注(报单编号)']].concat(b.ids.map(id=>{const r=repOf(id),u=usrOf(r.userId);return[u.alipayAcc,u.alipayName,(+r.rebate).toFixed(2),r.code]})));toast('已导出 '+b.code)},
payDone(bid){const b=DB.batches.find(x=>x.id===bid);if(!confirm('确认批次 '+b.code+' 已完成线下打款?'))return;b.status='已打款';b.paidAt=now();b.ids.forEach(id=>{const r=repOf(id);if(r&&r.status==='返款已审核通过'){setStatus(r,'已返款','管理员','批次 '+b.code);r.paidAt=now();notify(r.userId,r.id,'打款','报单 '+r.code+' 已打款 '+yuan(r.rebate)+',请查收支付宝')}});oplog('管理员','打款批次完成',b.code);save();toast('批次已完成,相关报单置「已返款」');route()},
finCSV(){dlCSV('活动财务核算-'+fmtD(now())+'.csv',[['活动','报单','有效单','丢单率','驳回率','渠道收入','已返款','在途待返','已追回','坏账','净收益','单均净收益','ROI']].concat(DB.activities.map(a=>{const f=finOf(a);return[a.name,f.total,f.eff,pct(f.lostRate),pct(f.rejRate),f.income.toFixed(2),f.paidSum.toFixed(2),f.way.toFixed(2),f.back.toFixed(2),f.bad.toFixed(2),f.net.toFixed(2),f.per.toFixed(2),pct(f.roi)]})));toast('报表已导出')},
findVio(){const q=($('#cq').value||'').trim();const r=DB.reports.find(x=>x.code===q||x.orderNo===q);
 $('#cres').innerHTML=r?'<div class="card"><div class="rowline"><b>'+esc(r.code)+'</b>'+chip(r.status)+'</div><div class="mini">单号 '+esc(r.orderNo)+' · '+esc((actOf(r)||{}).name||'')+' · 用户 '+esc((usrOf(r.userId)||{}).wechat||'')+' · 返款 '+yuan(r.rebate)+(r.violation?' · <b style="color:var(--terra)">已判定违规</b>':'')+'</div>'+(r.violation?'':'<div style="margin-top:6px"><button class="btn sm dan" onclick="A.vioModal(\''+r.id+'\')">判定违规</button></div>')+'</div>':'<div class="empty">未找到该报单</div>'},
clawDone(id){const c=DB.clawbacks.find(x=>x.id===id);c.status='已追回';oplog('管理员','追回完成',(repOf(c.reportId)||{}).code+' '+yuan(c.amount));save();toast('已登记追回');route()},
clawBad(id){const c=DB.clawbacks.find(x=>x.id===id);if(!confirm('确认计为坏账?将计入活动成本。'))return;c.status='坏账';oplog('管理员','追回计坏账',(repOf(c.reportId)||{}).code+' '+yuan(c.amount));save();toast('已计坏账');route()},
setLF(v){TMP.lf=v;route()},
toggleUser(id){const u=usrOf(id);u.status=u.status==='正常'?'禁用':'正常';oplog('管理员',u.status==='禁用'?'禁用用户':'启用用户',u.wechat);save();toast(u.wechat+' 已'+u.status);route()}
};

load();route();
window.__bd={get DB(){return DB},save,load,seed,setStatus,advanceAfterFollow,markLost,submitMaterial,approve,reject,parseOrderNos,defRebate,finOf,incomeOf,pendingMat,A};
