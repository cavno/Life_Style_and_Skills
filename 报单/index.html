<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报单管理系统</title>
<style>
:root{
 --bg:#F6F0DF;--panel:#FFFDF6;--line:#E7DBBB;--line2:#EFE5CB;
 --ink:#2C2A22;--mut:#8A8068;
 --teal:#3D7A67;--teal-d:#2A574A;--teal-t:#E7F0EB;
 --terra:#BC4B33;--terra-t:#F8E7E0;
 --gold:#A97F2F;--gold-t:#F7EDD3;
 --pine:#22392F;--pine2:#1C2F28;
 --serif:"Noto Serif SC","Source Han Serif SC","Songti SC",STSong,serif;
 --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Microsoft YaHei",sans-serif;
 --sh:0 1px 2px rgba(64,54,24,.05),0 10px 26px -20px rgba(64,54,24,.4);
 --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--teal);text-decoration:none}
h1,h2,h3,.serif{font-family:var(--serif);letter-spacing:.01em}
svg{display:block}

/* ---------- 布局:侧栏 + 主区 ---------- */
.wrap{display:flex;min-height:100vh}
.sidebar{width:230px;flex:none;background:linear-gradient(180deg,var(--pine),var(--pine2));color:#CFE0D6;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40}
.sb-h{padding:18px 16px 14px;display:flex;gap:11px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)}
.seal{width:36px;height:36px;flex:none;background:var(--terra);color:#FBEFE3;border-radius:9px;display:grid;place-items:center;font-family:var(--serif);font-size:13px;line-height:1.05;text-align:center;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25)}
.sb-h b{font-family:var(--serif);font-size:15px;color:#F3EAD3;display:block;line-height:1.25;font-weight:600}
.sb-h .mini{color:#7E9A8C}
.nav{flex:1;overflow-y:auto;padding:10px}
.nav .grp{font-size:10.5px;color:#6F8B7D;letter-spacing:.18em;margin:14px 10px 5px}
.nav a{display:flex;gap:10px;align-items:center;color:#B9CEC3;padding:9px 12px;border-radius:10px;font-size:13.5px;margin:2px 0;transition:background .15s,color .15s}
.nav a svg{width:18px;height:18px;flex:none;opacity:.9}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.on{background:rgba(122,197,166,.16);color:#fff;box-shadow:inset 3px 0 0 #6FBF9F}
.nav .bdg{margin-left:auto;background:var(--terra);color:#fff;font-size:10px;border-radius:99px;padding:1px 6.5px;line-height:1.5}
.sb-f{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;align-items:center}
.ava{width:34px;height:34px;flex:none;border-radius:50%;background:#3D7A67;color:#EAF3EE;display:grid;place-items:center;font-size:14px;font-family:var(--serif)}
.sb-f .who{flex:1;min-width:0}
.sb-f .who b{display:block;font-size:13px;color:#EDE6D2;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-f .who .mini{color:#7E9A8C}
.sb-f .out{background:none;border:none;color:#8FAA9C;cursor:pointer;padding:6px;border-radius:8px}
.sb-f .out:hover{background:rgba(255,255,255,.08);color:#fff}
.backdrop{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{min-height:58px;display:flex;align-items:center;gap:12px;padding:8px 22px;background:rgba(255,253,246,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.top h1{font-size:17.5px;margin:0;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menubtn{display:none}
.iconbtn{width:36px;height:36px;flex:none;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--mut);position:relative;transition:.15s}
.iconbtn:hover{color:var(--teal);border-color:var(--teal)}
.iconbtn svg{width:18px;height:18px}
.iconbtn .bdg{position:absolute;top:-5px;right:-5px;background:var(--terra);color:#fff;font-size:9.5px;border-radius:99px;padding:0 5px;line-height:1.5}
.rolechip{font-size:11.5px;background:var(--teal-t);color:var(--teal-d);border-radius:99px;padding:3px 11px;white-space:nowrap}
.qk{display:flex;gap:8px;align-items:center}
.qk a{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:4px 11px;color:var(--mut);white-space:nowrap}
.qk a b{color:var(--terra)}
.content{padding:22px;max-width:1180px;width:100%;margin:0 auto;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ---------- 组件 ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:16px}
.card>h3{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.card>h3 .no{font-size:11px;color:var(--terra);border:1px solid var(--terra);border-radius:6px;padding:0 5px;font-family:var(--sans)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.stat .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:9px;background:var(--teal-t);color:var(--teal)}
.stat .ic.gold{background:var(--gold-t);color:var(--gold)}
.stat .ic.terra{background:var(--terra-t);color:var(--terra)}
.stat .ic svg{width:17px;height:17px}
.stat .n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1.2}
.stat .n.bad{color:var(--terra)}
.stat .l{font-size:12px;color:var(--mut);margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 16px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font:inherit;font-size:13.5px;cursor:pointer;transition:.15s;white-space:nowrap;text-decoration:none}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--teal);color:var(--teal);transform:translateY(-1px)}
.btn.pri{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 6px 14px -8px rgba(61,122,103,.7)}
.btn.pri:hover{background:var(--teal-d);color:#fff}
.btn.dan{color:var(--terra);border-color:#E4B7AA}
.btn.dan:hover{border-color:var(--terra);color:var(--terra)}
.btn.dan.pri{background:var(--terra);border-color:var(--terra);color:#fff;box-shadow:0 6px 14px -8px rgba(188,75,51,.7)}
.btn.dan.pri:hover{background:#A23C27}
.btn.sm{height:29px;padding:0 12px;font-size:12.5px;border-radius:8px}
.btn.blk{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.f{margin-bottom:14px}
.f label{display:block;font-size:12.5px;color:var(--mut);margin-bottom:6px}
input,select,textarea{width:100%;height:38px;font:inherit;font-size:14px;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:.15s}
textarea{height:auto;min-height:96px;padding:10px 12px;line-height:1.6}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(61,122,103,.14)}
input[type=file]{padding:7px 12px;height:auto}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--teal);margin:0 8px 0 0;vertical-align:-2px}
input[type=date]{padding:0 10px}
.ck{display:block;font-size:13px;margin:8px 0;cursor:pointer}
.hint{font-size:12px;color:#8a6a22;background:var(--gold-t);border-left:3px solid var(--gold);padding:6px 9px;border-radius:6px;margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:2.5px 10px;border-radius:99px;font-weight:500;white-space:nowrap}
.pill i{width:6px;height:6px;border-radius:50%;background:currentColor}
.s-ok{background:#DCEBE2;color:#245247}
.s-teal{background:var(--teal-t);color:var(--teal-d)}
.s-gold{background:var(--gold-t);color:#8a6a22}
.s-bad{background:var(--terra-t);color:#a23c27}
.s-ink{background:#F1EAD6;color:var(--mut)}
.tbw{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:14px}
.tb{width:100%;border-collapse:collapse;font-size:13px;min-width:620px}
.tb th{background:#F6EFDB;color:#6d6448;font-weight:600;text-align:left;padding:9px 13px;white-space:nowrap}
.tb td{padding:9px 13px;border-top:1px solid var(--line2);vertical-align:middle}
.tb tr:hover td{background:#FBF6E8}
.num{font-variant-numeric:tabular-nums;white-space:nowrap}
.kv{display:grid;grid-template-columns:96px 1fr;gap:10px;font-size:13.5px;padding:8px 0;border-bottom:1px solid var(--line2)}
.kv:last-child{border-bottom:none}
.kv b{color:var(--mut);font-weight:400;font-size:12.5px;padding-top:1px}
.kv span{word-break:break-all;min-width:0}
.tl{margin:6px 0 0 5px;padding-left:18px;border-left:2px solid var(--line)}
.tl .it{position:relative;padding-bottom:14px;font-size:13px}
.tl .it:last-child{padding-bottom:2px}
.tl .it::before{content:'';position:absolute;left:-24.5px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px var(--panel)}
.tl .it.bad::before{background:var(--terra)}
.tl .tm{color:var(--mut);font-size:11.5px}
.mask{position:fixed;inset:0;background:rgba(32,26,12,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px;animation:fade .18s ease}
@keyframes fade{from{opacity:0}}
.box{background:var(--panel);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:20px 22px;border:1px solid var(--line);box-shadow:0 24px 60px -24px rgba(40,30,10,.5);animation:zoom .2s ease}
@keyframes zoom{from{opacity:0;transform:scale(.96)}}
.box h3{margin-top:0}
.toastw{position:fixed;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:99;pointer-events:none}
.toast{background:var(--teal-d);color:#fff;border-radius:99px;padding:9px 20px;font-size:13px;margin-bottom:8px;box-shadow:0 10px 24px -10px rgba(0,0,0,.4);animation:drop .25s ease}
.toast.err{background:var(--terra)}
@keyframes drop{from{opacity:0;transform:translateY(-10px)}}
.note{border-left:3px solid var(--teal);background:var(--teal-t);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:12.5px;color:#33544a}
.warnb{border-left:3px solid var(--terra);background:var(--terra-t);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:12.5px;color:#8c3826}
.empty{border:1.5px dashed var(--line);border-radius:12px;padding:36px 16px;text-align:center;color:var(--mut);font-size:13px;background:var(--panel)}
.empty svg{width:26px;height:26px;margin:0 auto 8px;opacity:.45}
.imgv{max-width:100%;border:1px solid var(--line);border-radius:10px;cursor:zoom-in;display:block}
.rowline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.frow{display:flex;gap:9px;flex-wrap:wrap;margin:10px 0;align-items:center}
.frow>input,.frow>select{flex:1;min-width:130px;width:auto}
.mini{font-size:12px;color:var(--mut)}
.distbar{display:flex;height:12px;border-radius:99px;overflow:hidden;border:1px solid var(--line);background:#fff;margin:12px 0 10px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12px;color:var(--mut)}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.acard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:6px;transition:.15s}
.acard:hover{border-color:var(--teal);transform:translateY(-2px)}
.acard .nm{font-family:var(--serif);font-size:15.5px;font-weight:600}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
.menu{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.menu a{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;color:var(--ink);border-bottom:1px solid var(--line2);font-size:14px}
.menu a:last-child{border-bottom:none}
.menu a:hover{background:#FBF6E8}
.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(900px 480px at 75% -8%,#EFE3C2,transparent 70%),radial-gradient(700px 420px at -10% 108%,#E9EFE4,transparent 65%),var(--bg)}
.lgc{width:100%;max-width:396px}
.lgc .card{padding:28px 26px}
.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.brand .seal{width:44px;height:44px;font-size:15px;border-radius:11px}
.brand b{font-family:var(--serif);font-size:20px;display:block;line-height:1.25}
@media(max-width:960px){
 .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-105%);transition:transform .25s ease;box-shadow:20px 0 50px -20px rgba(0,0,0,.5)}
 body.navopen .sidebar{transform:none}
 .backdrop{position:fixed;inset:0;background:rgba(28,22,8,.42);z-index:35}
 body.navopen .backdrop{display:block}
 .menubtn{display:grid}
 .top{padding:8px 14px}
 .content{padding:14px 14px 34px}
 .grid2{grid-template-columns:1fr}
 .qk{display:none}
}
@media print{.sidebar,.top{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<div class="toastw" id="toastw"></div>
<script>
/* ============ 报单管理系统 · 统一后台(用户 + 管理员同一入口,按角色出菜单) ============
   纯静态单文件;数据存 localStorage(不可用则内存兜底);生产化:将 DB/load/save 与领域函数替换为 REST API。 */

/* ---------- 线性图标 ---------- */
const IC={
 dash:'<rect x="3.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6"/>',
 act:'<path d="M4 9.5v5h3l6 4v-13l-6 4H4z"/><path d="M16.5 9.5a4.2 4.2 0 010 5.2"/>',
 list:'<path d="M8.5 6.5h12M8.5 12h12M8.5 17.5h12"/><circle cx="4.2" cy="6.5" r="1.1"/><circle cx="4.2" cy="12" r="1.1"/><circle cx="4.2" cy="17.5" r="1.1"/>',
 todo:'<circle cx="12" cy="12" r="8.4"/><path d="M12 7.6V12l3.1 2"/>',
 coin:'<circle cx="12" cy="12" r="8.4"/><path d="M8.8 8.8l3.2 3.4 3.2-3.4M12 12.2V17M9.2 14.6h5.6"/>',
 bell:'<path d="M18 15.5H6c1.5-1.4 2.1-3 2.1-5.4a3.9 3.9 0 117.8 0c0 2.4.6 4 2.1 5.4z"/><path d="M10.3 18.3a1.8 1.8 0 003.4 0"/>',
 gear:'<path d="M4 7.5h9M17.5 7.5H20M4 16.5h4M12.5 16.5H20"/><circle cx="15.2" cy="7.5" r="2.2"/><circle cx="10.2" cy="16.5" r="2.2"/>',
 follow:'<circle cx="10.6" cy="10.6" r="6.1"/><path d="M15.2 15.2L20 20"/>',
 review:'<rect x="4" y="4" width="16" height="16" rx="3.2"/><path d="M8.4 12.4l2.6 2.6 4.6-5.2"/>',
 pay:'<rect x="3.5" y="6" width="17" height="12.5" rx="2.6"/><path d="M3.5 10.2h17M7 14.8h4.2"/>',
 fin:'<path d="M5.5 19v-8M11.5 19V5M17.5 19v-5.5"/><path d="M3.5 19h17"/>',
 shield:'<path d="M12 3.6l7 2.7v5.1c0 4.2-2.9 6.6-7 8.6-4.1-2-7-4.4-7-8.6V6.3z"/><path d="M9.2 12l2 2.1 3.6-4"/>',
 log:'<rect x="5" y="3.6" width="14" height="16.8" rx="2.6"/><path d="M9 8.2h6M9 12h6M9 15.8h3.6"/>',
 users:'<circle cx="9" cy="9.2" r="3.1"/><path d="M3.6 18.8c.8-2.9 2.8-4.4 5.4-4.4s4.6 1.5 5.4 4.4"/><circle cx="16.6" cy="10" r="2.5"/><path d="M15.7 14.6c2.6.3 4.1 1.7 4.8 4.2"/>',
 out:'<path d="M9.5 4.5h-3a2 2 0 00-2 2v11a2 2 0 002 2h3"/><path d="M15 8.2l4 3.8-4 3.8M19 12H9.5"/>',
 back:'<path d="M14.5 5.8L8.2 12l6.3 6.2"/>',
 menu:'<path d="M4 7h16M4 12h16M4 17h16"/>',
 plus:'<path d="M12 5.5v13M5.5 12h13"/>',
 dl:'<path d="M12 4.5v9.5m0 0l-3.8-3.8M12 14l3.8-3.8"/><path d="M5 19h14"/>',
 up:'<path d="M12 15.5V6m0 0L8.2 9.8M12 6l3.8 3.8"/><path d="M5 19h14"/>',
 eye:'<path d="M3.2 12S6.7 6.2 12 6.2 20.8 12 20.8 12 17.3 17.8 12 17.8 3.2 12 3.2 12z"/><circle cx="12" cy="12" r="2.5"/>',
 img:'<rect x="4" y="5" width="16" height="14" rx="2.6"/><circle cx="9" cy="10" r="1.6"/><path d="M5.2 17l4.6-4.2 3.4 3 2.4-2 3.2 3.4"/>',
 alert:'<path d="M12 4.2l8.8 15.2H3.2z"/><path d="M12 10.2v4.2M12 17v.3"/>'};
const ico=(n,s)=>'<svg viewBox="0 0 24 24" '+(s?'width="'+s+'" height="'+s+'"':'')+' fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(IC[n]||'')+'</svg>';

/* ---------- 常量 ---------- */
const LS_KEY='bd_p0_v2', SES_KEY='bd_p0_ses_v2';
const MATS=['尾款图','物流单号','评价图','完成图'];
const STATUSES=['已报单','已跟单','已丢单','尾款图待传','物流单号待传','评价图待传','完成图待传','返款待审核','返款已审核通过','返款未审核通过','已返款'];
const STC={'已报单':'#C7B98F','已跟单':'#9FCBB8','尾款图待传':'#DBB65E','物流单号待传':'#DBB65E','评价图待传':'#DBB65E','完成图待传':'#DBB65E','返款待审核':'#7FB9A2','返款已审核通过':'#4E8E77','已返款':'#33604F','已丢单':'#C96A54','返款未审核通过':'#B0492F'};
const REJECTS=['截图不全','金额不符','未用券','备注错误','使用返利软件','其他'];
const VIOTYPES=['申请保价','随意退款','使用返利软件','串ID/批量地址','其他'];
const ADMIN={acc:'admin',pwd:'admin123'};
const NOTICE9=['下单后请及时报单,逾期不予结算。','报单截图必须为完整长图,需露出:收货地址、店铺名、商品、用券情况、实付款金额、订单号、下单时间。','活动要求备注的,截图必须露出备注内容。','使用专属券+备注的项目,提交前自行核对用券、备注、订单号、金额四项是否正确;不用券、无备注、备注错误均不予结算。','使用购物金的项目,购物金实付款必须露出。','禁止使用任何返利软件。','所有订单不可申请保价;申请保价不予结算,已返款的须退回。','禁止随意退款、串ID及批量地址下单。','任何违反上述要求的情况,已发放的返款将被追回。'].join('\n');

/* ---------- 存储层与工具(生产化时替换为 API) ---------- */
const store=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return localStorage}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v)},removeItem:k=>{delete m[k]}}}})();
let DB=null;
function save(){try{store.setItem(LS_KEY,JSON.stringify(DB))}catch(e){toast('浏览器存储空间不足:截图过大或数据过多,请在设置中重置数据','err')}}

/* ---------- 状态机核心(PRD §4) ---------- */
function setStatus(r,to,op,note){const from=r.status||null;r.status=to;r.logs.push({from,to,op,note:note||'',at:now()});oplog(op,'状态 '+(from||'新建')+' → '+to,r.code+(note?' · '+note:''))}
function advanceAfterFollow(r,op){const a=actOf(r);setStatus(r,'已跟单',op||'管理员','渠道核对命中');const m=pendingMat(r,a);setStatus(r,m?m+'待传':'返款待审核','系统',m?'素材闸门:待传 '+m:'素材齐/无素材要求');notify(r.userId,r.id,'跟单','报单 '+r.code+' 已跟单'+(m?',请补传:'+m:',已进入返款审核'))}
function markLost(r,op,note){setStatus(r,'已丢单',op||'管理员',note||'渠道核对不到');notify(r.userId,r.id,'丢单','报单 '+r.code+' 已丢单('+(note||'渠道核对不到')+'),可在订单详情申诉一次')}
function submitMaterial(r,m,val){r.materials=r.materials||{};r.materials[m]={v:val,at:now()};const a=actOf(r);const nx=pendingMat(r,a);setStatus(r,nx?nx+'待传':'返款待审核','用户','完成:'+m)}
function approve(r,amount,op){r.rebate=Math.round((+amount)*100)/100;setStatus(r,'返款已审核通过',op||'管理员','返款 '+yuan(r.rebate));notify(r.userId,r.id,'审核','报单 '+r.code+' 审核通过,返款 '+yuan(r.rebate)+',待打款')}
function reject(r,reason,op){r.rejectReason=reason;setStatus(r,'返款未审核通过',op||'管理员',reason);notify(r.userId,r.id,'驳回','报单 '+r.code+' 审核未通过:'+reason+'。请修改后重新提交')}

/* ---------- 财务与收益口径(PRD §6.5 / §5.6) ---------- */
function finOf(a){const rs=DB.reports.filter(r=>r.actId===a.id);const followed=rs.filter(r=>r.logs.some(l=>l.to==='已跟单'));const lost=rs.filter(r=>r.status==='已丢单');const paidRs=rs.filter(r=>r.status==='已返款');const paidSum=paidRs.reduce((s,r)=>s+(+r.rebate||0),0);const claws=DB.clawbacks.filter(c=>rs.some(r=>r.id===c.reportId));const back=claws.filter(c=>c.status==='已追回').reduce((s,c)=>s+(+c.amount||0),0);const bad=claws.filter(c=>c.status==='坏账').reduce((s,c)=>s+(+c.amount||0),0);const way=rs.filter(r=>r.status==='返款已审核通过').reduce((s,r)=>s+(+r.rebate||0),0)+rs.filter(r=>r.status==='返款待审核').reduce((s,r)=>s+defRebate(r,a),0);const rejN=rs.reduce((s,r)=>s+r.logs.filter(l=>l.to==='返款未审核通过').length,0);const audN=rs.reduce((s,r)=>s+r.logs.filter(l=>l.from==='返款待审核'&&(l.to==='返款已审核通过'||l.to==='返款未审核通过')).length,0);const income=+a.incomeTotal||0;const net=income-(paidSum-back);return{total:rs.length,eff:followed.length,lost:lost.length,lostRate:rs.length?lost.length/rs.length:0,rejRate:audN?rejN/audN:0,paidSum,way,back,bad,income,net,per:followed.length?net/followed.length:0,roi:paidSum?net/paidSum:0}}
function incomeOf(u){const rs=DB.reports.filter(r=>r.userId===u.id);const done=rs.filter(r=>r.status==='已返款');const d0=new Date();const mS=new Date(d0.getFullYear(),d0.getMonth(),1).getTime();return{done:done.reduce((s,r)=>s+(+r.rebate||0),0),month:done.filter(r=>r.paidAt>=mS).reduce((s,r)=>s+(+r.rebate||0),0),way:rs.filter(r=>r.status==='返款已审核通过').reduce((s,r)=>s+(+r.rebate||0),0)+rs.filter(r=>r.status==='返款待审核').reduce((s,r)=>s+defRebate(r,actOf(r)),0),rs}}

/* ---------- 批量单号解析(PRD §5.4) ---------- */
function parseOrderNos(text){const raw=String(text||'').split(/[\s,;，；、|]+/).map(s=>s.trim()).filter(Boolean);const seen=new Set(),ok=[],bad=[];for(const t of raw){if(seen.has(t))continue;seen.add(t);if(/^[A-Za-z0-9\-_]{6,32}$/.test(t)&&!/[\u4e00-\u9fff]/.test(t))ok.push(t);else bad.push(t)}return{ok:ok.slice(0,500),bad,over:Math.max(0,ok.length-500)}}

/* ---------- 截图自动拼图(PRD §5.3) ---------- */
function readImg(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=fr.result};fr.onerror=rej;fr.readAsDataURL(file)})}
async function stitchFiles(files,W,q){W=W||640;q=q||0.62;const imgs=[];for(const f of files)imgs.push(await readImg(f));const c=document.createElement('canvas');c.width=W;c.height=imgs.reduce((s,im)=>s+Math.max(1,Math.round(im.height*W/im.width)),0);const g=c.getContext('2d');g.fillStyle='#fff';g.fillRect(0,0,c.width,c.height);let y=0;for(const im of imgs){const h=Math.max(1,Math.round(im.height*W/im.width));g.drawImage(im,0,y,W,h);y+=h}let d=c.toDataURL('image/jpeg',q);if(d.length>900*1024)d=c.toDataURL('image/jpeg',0.4);if(d.length>1500*1024){const c2=document.createElement('canvas');const k=480/W;c2.width=480;c2.height=Math.round(c.height*k);c2.getContext('2d').drawImage(c,0,0,c2.width,c2.height);d=c2.toDataURL('image/jpeg',0.4)}return d}

 const u=DB.users.find(x=>x.phone===acc&&x.pwd===pw);if(!u)return toast('账号或密码不正确','err');if(u.status==='禁用')return toast('账号已被禁用,请联系管理员','err');

hintRm(inp,actId){const a=DB.activities.find(x=>x.id===actId);const v=inp.value.trim();let h='';if(a&&a.remarkTpl&&v&&!v.includes(a.remarkTpl))h='与指定备注「'+a.remarkTpl+'」不一致,请核对';$('#hrm').innerHTML=h?'<div class="hint">'+esc(h)+'</div>':''},
async pickImgs(inp){const fs=Array.from(inp.files||[]);if(!fs.length)return;if(fs.length>9)return toast('最多 9 张','err');toast('正在拼接 '+fs.length+' 张截图…');
 try{TMP.img=await stitchFiles(fs);TMP.imgN=fs.length;$('#imgPrev').innerHTML='<img class="imgv" src="'+TMP.img+'" onclick="A.zoom(this.src)"><div class="mini" style="margin-top:6px">已拼接 '+fs.length+' 张,点击可预览;重新选择将覆盖</div>'}catch(e){toast('拼接失败,请重试或减少图片数量','err')}},
submitReport(actId){const a=DB.activities.find(x=>x.id===actId);const u=curUser();if(!a||a.status!=='进行中')return toast('活动不在进行中','err');
 const no=$('#nno').value.trim(),amt=+$('#namt').value,wx=$('#nwx').value.trim(),rm=$('#nrm').value.trim();
 if(!/^[A-Za-z0-9\-_]{6,32}$/.test(no))return toast('订单号格式不正确','err');
 if(DB.reports.some(r=>r.orderNo===no))return toast('该订单号已报单,禁止重复提交','err');
 if(!(amt>0))return toast('请填写正确的实付金额','err');
 if(!wx)return toast('请填写微信号','err');
 if(wx!==u.wechat&&!confirm('微信号与注册绑定('+u.wechat+')不一致,确认继续?'))return;
 if(a.remarkTpl&&!rm)return toast('本活动要求填写备注','err');
 if(!TMP.img)return toast('请上传订单截图','err');
 const cks=document.querySelectorAll('.ckq');for(const c of cks)if(!c.checked)return toast('请逐项完成提交前自检','err');
 const r={id:uid(),code:nextCode(),userId:u.id,actId:a.id,orderNo:no,amount:Math.round(amt*100)/100,wechat:wx,remark:rm,img:TMP.img,imgCount:TMP.imgN,status:'',rejectReason:'',rebate:0,materials:{},batchId:'',violation:false,appeal:null,createdAt:now(),paidAt:0,logs:[]};
 setStatus(r,'已报单','用户');DB.reports.push(r);save();TMP.img=null;TMP.imgN=0;TMP.newFor='';toast('报单成功:'+r.code);go('order/'+r.id)},
setOF(k,v){TMP.of[k]=v;route()},
batchModal(){modal(vBatchModal())},
prevNos(){const p=parseOrderNos($('#bnos').value);$('#bprev').innerHTML='解析出 <b>'+p.ok.length+'</b> 个有效单号'+(p.bad.length?',忽略 '+p.bad.length+' 个无效项':'')+(p.over?';超出上限 500,已截断 '+p.over+' 个':'')},
applyNos(){const p=parseOrderNos($('#bnos').value);if(!p.ok.length)return toast('未解析到有效单号','err');TMP.nos=p.ok;closeM();toast('已按 '+p.ok.length+' 个单号过滤');route()},
clearNos(){TMP.nos=null;route()},
expOrders(){const u=curUser();const rs=filteredReports(u);dlCSV('我的报单-'+fmtD(now())+'.csv',[['报单编号','订单号','活动','实付','返款','状态','报单时间']].concat(rs.map(r=>[r.code,r.orderNo,(actOf(r)||{}).name||'',r.amount,r.rebate||'',r.status,fmtD(r.createdAt)])));toast('已导出 '+rs.length+' 条')},
matText(id){const r=repOf(id);const v=($('#mtxt').value||'').trim();if(!/^[A-Za-z0-9]{8,24}$/.test(v))return toast('快递单号格式疑似有误(8–24 位字母数字)','err');submitMaterial(r,'物流单号',v);save();toast('物流单号已提交');route()},
async matImg(inp,id,m){const fs=Array.from(inp.files||[]);if(!fs.length)return;if(fs.length>9)return toast('最多 9 张','err');toast('正在拼接并提交…');try{const d=await stitchFiles(fs);const r=repOf(id);submitMaterial(r,m,d);save();toast(m+' 已提交');route()}catch(e){toast('处理失败,请重试','err')}},
async pickR(inp){const fs=Array.from(inp.files||[]);if(!fs.length)return;try{TMP.rimg=await stitchFiles(fs);toast('新截图已拼接,提交时生效')}catch(e){toast('拼接失败','err')}},
resubmit(id){const r=repOf(id);const amt=+$('#ramt').value,rm=$('#rrm').value.trim();if(!(amt>0))return toast('金额不正确','err');const a=actOf(r);if(a&&a.remarkTpl&&!rm)return toast('本活动要求填写备注','err');r.amount=Math.round(amt*100)/100;r.remark=rm;if(TMP.rimg){r.img=TMP.rimg;TMP.rimg=null}r.rejectReason='';setStatus(r,'返款待审核','用户','整改重提');save();toast('已重新提交审核');route()},
appeal(id){const r=repOf(id);const t=($('#aptxt').value||'').trim();if(!t)return toast('请填写申诉理由','err');r.appeal={txt:t,at:now(),used:false};oplog('用户','丢单申诉',r.code);save();toast('申诉已提交');route()},
openN(id){const n=DB.notices.find(x=>x.id===id);if(!n)return;n.read=true;save();if(n.reportId&&repOf(n.reportId))go('order/'+n.reportId);else route()},
/* 管理 */
actOn(id){const a=DB.activities.find(x=>x.id===id);a.status='进行中';oplog('管理员','活动上线',a.name);save();route()},
actEnd(id){const a=DB.activities.find(x=>x.id===id);if(!confirm('结束活动「'+a.name+'」?结束后不可新增报单。'))return;a.status='已结束';oplog('管理员','活动结束',a.name);save();route()},
saveAct(id){const g=i=>$('#'+i).value;const name=g('ename').trim();if(!name)return toast('请填写活动名称','err');
 const st=new Date(g('est')).getTime(),et=new Date(g('eet')).getTime()+D-1;if(!(st>0&&et>st))return toast('起止日期不正确','err');
 const rv=+g('erv');if(!(rv>0))return toast('返款值必须大于 0','err');
 const mats=MATS.filter(m=>Array.from(document.querySelectorAll('.emat:checked')).some(c=>c.value===m));
 const o={name,platform:g('eplat'),shop:g('eshop').trim(),product:g('eprod').trim(),refPrice:+g('eref')||0,startAt:st,endAt:et,rebateType:g('erty'),rebateVal:rv,rebateCap:+g('ecap')||0,materials:mats,couponInfo:g('ecp').trim(),remarkTpl:g('erm').trim(),useGouwujin:$('#egw').checked,notice:g('entc').trim()||NOTICE9,incomeTotal:+g('einc')||0,status:g('estt')};
 if(id==='new'){o.id=uid();o.createdAt=now();DB.activities.unshift(o);oplog('管理员','新建活动',o.name)}else{const a=DB.activities.find(x=>x.id===id);Object.assign(a,o);oplog('管理员','编辑活动',a.name)}
 save();toast('活动已保存');go('m/acts')},
follow(){const ids=Array.from(document.querySelectorAll('.ckfw:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选报单','err');ids.forEach(id=>advanceAfterFollow(repOf(id),'管理员'));save();toast('已跟单 '+ids.length+' 笔');route()},
lost(){const ids=Array.from(document.querySelectorAll('.ckfw:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选报单','err');if(!confirm('确认将 '+ids.length+' 笔标记为已丢单?'))return;ids.forEach(id=>markLost(repOf(id),'管理员'));save();toast('已标记丢单 '+ids.length+' 笔');route()},
appealOk(id){const r=repOf(id);setStatus(r,'已报单','管理员','申诉通过');r.appeal.used=true;notify(r.userId,r.id,'申诉','报单 '+r.code+' 申诉通过,已重新进入跟单核对');save();toast('已改回已报单');route()},
appealNo(id){const r=repOf(id);r.appeal.used=true;oplog('管理员','驳回申诉',r.code);notify(r.userId,r.id,'申诉','报单 '+r.code+' 申诉未通过,维持已丢单');save();toast('已驳回申诉');route()},
setRF(v){TMP.rf=v;route()},
batchApprove(){const ids=Array.from(document.querySelectorAll('.ckrev:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选','err');let sum=0;ids.forEach(id=>{const r=repOf(id);const amt=defRebate(r,actOf(r));approve(r,amt);sum+=amt});save();toast('批量通过 '+ids.length+' 笔,合计 '+yuan(sum));route()},
doApprove(id){const r=repOf(id);const amt=+$('#vamt').value;if(!(amt>0))return toast('返款金额不正确','err');approve(r,amt);save();toast('已通过:'+yuan(amt));go('m/review')},
doReject(id){const r=repOf(id);const reason=$('#vrs').value+(($('#vrx').value||'').trim()?':'+$('#vrx').value.trim():'');reject(r,reason);save();toast('已驳回');go('m/review')},
vioModal(id){modal('<h3>判定违规</h3><div class="f"><label>违规类型</label><select id="vio">'+VIOTYPES.map(x=>'<option>'+x+'</option>').join('')+'</select></div><div class="f"><label>补充说明(选填)</label><input id="viox"></div><p class="mini">未返款:置「返款未审核通过·违规」不予结算;已返款:生成追回单进入台账。</p><div class="frow" style="margin-bottom:0"><button class="btn dan pri" onclick="A.doVio(\''+id+'\')">确认判定</button><button class="btn" onclick="A.closeM()">取消</button></div>')},
doVio(id){const r=repOf(id);const reason=$('#vio').value+(($('#viox').value||'').trim()?':'+$('#viox').value.trim():'');r.violation=true;
 if(r.status==='已返款'){DB.clawbacks.unshift({id:uid(),reportId:r.id,amount:+r.rebate||0,status:'待追回',reason,at:now()});oplog('管理员','判定违规并建追回单',r.code+' · '+reason+' '+yuan(r.rebate));notify(r.userId,r.id,'追回','报单 '+r.code+' 判定违规('+reason+'),返款 '+yuan(r.rebate)+' 须退回')}
 else{r.rejectReason='违规:'+reason;setStatus(r,'返款未审核通过','管理员','违规:'+reason);notify(r.userId,r.id,'违规','报单 '+r.code+' 判定违规('+reason+'),不予结算')}
 closeM();save();toast('已判定违规');route()},
mkBatch(){const ids=Array.from(document.querySelectorAll('.ckpay:checked')).map(c=>c.value);if(!ids.length)return toast('请先勾选','err');DB.seq.batch++;const total=ids.reduce((s,id)=>s+(+repOf(id).rebate||0),0);const b={id:uid(),code:'PB-'+String(DB.seq.batch).padStart(4,'0'),ids,count:ids.length,total:Math.round(total*100)/100,status:'待打款',createdAt:now(),paidAt:0,operator:'管理员'};ids.forEach(id=>{repOf(id).batchId=b.id});DB.batches.unshift(b);oplog('管理员','生成打款批次',b.code+' · '+b.count+' 笔 '+yuan(b.total));save();toast('批次 '+b.code+' 已生成,可导出 CSV');route()},
batchCSV(bid){const b=DB.batches.find(x=>x.id===bid);dlCSV(b.code+'.csv',[['支付宝账号','姓名','金额','备注(报单编号)']].concat(b.ids.map(id=>{const r=repOf(id),u=usrOf(r.userId);return[u.alipayAcc,u.alipayName,(+r.rebate).toFixed(2),r.code]})));toast('已导出 '+b.code)},
payDone(bid){const b=DB.batches.find(x=>x.id===bid);if(!confirm('确认批次 '+b.code+' 已完成线下打款?'))return;b.status='已打款';b.paidAt=now();b.ids.forEach(id=>{const r=repOf(id);if(r&&r.status==='返款已审核通过'){setStatus(r,'已返款','管理员','批次 '+b.code);r.paidAt=now();notify(r.userId,r.id,'打款','报单 '+r.code+' 已打款 '+yuan(r.rebate)+',请查收支付宝')}});oplog('管理员','打款批次完成',b.code);save();toast('批次已完成,相关报单置「已返款」');route()},
finCSV(){dlCSV('活动财务核算-'+fmtD(now())+'.csv',[['活动','报单','有效单','丢单率','驳回率','渠道收入','已返款','在途待返','已追回','坏账','净收益','单均净收益','ROI']].concat(DB.activities.map(a=>{const f=finOf(a);return[a.name,f.total,f.eff,pct(f.lostRate),pct(f.rejRate),f.income.toFixed(2),f.paidSum.toFixed(2),f.way.toFixed(2),f.back.toFixed(2),f.bad.toFixed(2),f.net.toFixed(2),f.per.toFixed(2),pct(f.roi)]})));toast('报表已导出')},
findVio(){const q=($('#cq').value||'').trim();const r=DB.reports.find(x=>x.code===q||x.orderNo===q);
 $('#cres').innerHTML=r?'<div class="card"><div class="rowline"><b class="num">'+esc(r.code)+'</b>'+chip(r.status)+'</div><div class="mini" style="margin-top:4px">单号 <span class="num">'+esc(r.orderNo)+'</span> · '+esc((actOf(r)||{}).name||'')+' · 用户 '+esc((usrOf(r.userId)||{}).wechat||'')+' · 返款 '+yuan(r.rebate)+(r.violation?' · <b style="color:var(--terra)">已判定违规</b>':'')+'</div>'+(r.violation?'':'<div style="margin-top:8px"><button class="btn sm dan" onclick="A.vioModal(\''+r.id+'\')">判定违规</button> <a class="btn sm" href="#/order/'+r.id+'">详情</a></div>')+'</div>':emptyBox('未找到该报单','follow')},
clawDone(id){const c=DB.clawbacks.find(x=>x.id===id);c.status='已追回';oplog('管理员','追回完成',(repOf(c.reportId)||{}).code+' '+yuan(c.amount));save();toast('已登记追回');route()},
clawBad(id){const c=DB.clawbacks.find(x=>x.id===id);if(!confirm('确认计为坏账?将计入活动成本。'))return;c.status='坏账';oplog('管理员','追回计坏账',(repOf(c.reportId)||{}).code+' '+yuan(c.amount));save();toast('已计坏账');route()},
setLF(v){TMP.lf=v;route()},
toggleUser(id){const u=usrOf(id);u.status=u.status==='正常'?'禁用':'正常';oplog('管理员',u.status==='禁用'?'禁用用户':'启用用户',u.wechat);save();toast(u.wechat+' 已'+u.status);route()}
};
window.A=A;

/* ---------- 启动 ---------- */
window.addEventListener('hashchange',route);
load();route();
window.__bd={get DB(){return DB},save,load,seed,setStatus,advanceAfterFollow,markLost,submitMaterial,approve,reject,parseOrderNos,defRebate,finOf,incomeOf,pendingMat,A};
</script>
